<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗紀錄系統 v3.5 (自動同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-layout { transition: all 0.3s ease-in-out; }
        
        :root {
            --table-width: 100%;
            --font-size: 14px;
            --col1-width: 140px; 
        }

        #table-container table { width: var(--table-width); font-size: var(--font-size); margin: 0 auto; table-layout: fixed; }
        #table-container th:first-child, #table-container td:first-child { width: var(--col1-width); word-break: break-all; }
        
        .student-item { transition: all 0.2s; border-radius: 8px; }
        .student-item:hover { background-color: #f3f4f6; cursor: pointer; transform: translateX(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; text-align: center; background: transparent; outline: none; border-bottom: 1px solid #e5e7eb; font-size: inherit; }
        .table-input:focus { border-bottom: 2px solid #3b82f6; }
        .fill-blank { border-bottom: 1px solid #4b5563; text-align: center; outline: none; background: transparent; font-size: inherit; }

        .resizer-line { width: 8px; background-color: #e5e7eb; cursor: col-resize; transition: background-color 0.2s; }
        .resizer-line:hover, .resizer-line:active { background-color: #60a5fa; }

        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden text-gray-800">

<div id="mainContainer" class="flex h-full w-full flex-col md:flex-row transition-layout">
    
    <!-- 視訊顯示區 -->
    <div id="videoContainer" class="relative bg-black flex flex-col items-center justify-center p-2 flex-1 h-full min-w-0 transition-layout">
        <div class="absolute top-4 left-4 z-10 bg-white/90 p-2 rounded-lg shadow-lg flex items-center gap-2 backdrop-blur-sm">
            <select id="cameraSelect" class="border rounded p-1 text-sm outline-none max-w-[120px] bg-white"></select>
            <button id="refreshCamBtn" class="bg-blue-100 hover:bg-blue-200 p-1.5 rounded transition-colors" title="重新偵測"><svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button id="swapLayoutBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="左右互換"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button id="fullscreenBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="全螢幕模式"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
        </div>
        
        <button id="toggleSidebarBtn" class="absolute top-4 right-4 z-30 bg-blue-600 text-white p-2.5 rounded-full shadow-2xl hover:bg-blue-700 transform active:scale-95 transition-all">
            <svg id="sidebar-icon" class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
        </button>

        <video id="video" class="w-full h-full object-contain bg-gray-900 rounded-lg shadow-inner" autoplay playsinline></video>
        <div id="noCameraMsg" class="hidden absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-900/80 rounded-lg">偵測不到攝影機</div>
    </div>

    <div id="resizer" class="hidden md:flex resizer-line z-40 items-center justify-center shrink-0">
        <div class="w-1 h-12 bg-gray-400 rounded-full"></div>
    </div>

    <!-- 紀錄面板側邊欄 -->
    <div id="sidebar" class="w-full bg-white flex flex-col shadow-2xl z-20 h-1/2 md:h-full transition-layout overflow-hidden shrink-0" style="width: 480px; min-width: 320px;">
        
        <div class="p-4 bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-blue-100 shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-extrabold text-blue-900 tracking-tight">實驗紀錄系統 <span class="text-xs font-normal text-white bg-blue-500 px-2 py-0.5 rounded-full ml-1 shadow-sm">v3.5 同步版</span></h1>
                <div class="flex gap-2">
                    <!-- 僅保留 Sheets 同步作為主要數據管理入口 -->
                    <button onclick="openSyncModal()" class="text-sm bg-green-600 text-white px-4 py-1.5 rounded-lg hover:bg-green-700 transition flex items-center gap-2 shadow-md font-bold active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Sheets 同步中心
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-3">
                <select id="gradeSelect" class="border border-blue-200 rounded p-1.5 text-sm outline-none bg-white shadow-sm focus:ring-2 focus:ring-blue-400 transition"><option value="">讀取中...</option></select>
                <select id="classSelect" class="border border-blue-200 rounded p-1.5 text-sm outline-none bg-white shadow-sm focus:ring-2 focus:ring-blue-400 transition"><option value="">讀取中...</option></select>
            </div>
            
            <select id="expSelect" class="w-full border border-blue-200 rounded p-1.5 font-bold text-blue-800 text-sm mb-2 shadow-sm focus:ring-2 focus:ring-blue-400 transition">
                <option value="exp1">1. 固定電阻 (1000Ω)</option>
                <option value="exp2">2. 電阻串聯 (固定 3V)</option>
                <option value="exp3">3. 電阻並聯 (固定 3V)</option>
                <option value="exp4">4. 並聯迴路觀察</option>
            </select>

            <div class="bg-white/60 p-2 rounded-lg border border-blue-100 flex gap-4 shadow-sm backdrop-blur-sm">
                <div class="flex items-center gap-2 text-[10px] text-gray-600 font-bold flex-1">
                    文字 <input type="range" id="fontSlider" min="10" max="22" value="14" class="flex-1 h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex items-center gap-2 text-[10px] text-gray-600 font-bold flex-1">
                    首欄 <input type="range" id="colWidthSlider" min="50" max="200" value="140" class="flex-1 h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto bg-gray-50 p-4 space-y-4 no-scrollbar relative">
            <div id="offlineWarning" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded relative text-sm" role="alert">
                <span class="block sm:inline">⚠️ 資料庫未連線，請點擊「同步中心」抓取名單。</span>
            </div>

            <div id="table-container" class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 overflow-x-auto min-h-[100px] transition-all"></div>
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gradient-to-r from-gray-100 to-gray-50 px-4 py-2.5 border-b flex justify-between items-center text-sm font-bold">
                    <span class="text-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        班級名單
                    </span>
                    <div class="flex items-center gap-2">
                        <span id="saveStatusIndicator" class="text-xs text-green-600 font-medium hidden">雲端已同步 ✓</span>
                        <span id="studentCount" class="text-xs font-mono bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full shadow-inner">--</span>
                    </div>
                </div>
                <div id="student-list" class="divide-y divide-gray-100 max-h-[450px] overflow-y-auto no-scrollbar">
                    <div class="p-10 text-center text-gray-400 text-sm flex flex-col items-center">
                        正在連線 Firebase...
                    </div>
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t shrink-0 flex flex-col gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button id="calcBtn" class="w-full bg-green-500 text-white font-bold py-2.5 rounded-lg text-sm shadow hover:bg-green-600 active:scale-95 transition-all">自動計算 (V/I) × 1000</button>
            <div class="flex gap-2">
                <button id="clearExpBtn" class="flex-1 bg-red-50 text-red-600 border border-red-200 font-bold py-2 rounded-lg text-xs hover:bg-red-100 transition-colors">清除表格</button>
                <button id="saveExpBtn" class="flex-[2] bg-blue-600 text-white font-bold py-2 rounded-lg text-xs shadow hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    儲存表格至 Firebase
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ================= 彈出視窗區 ================= -->

<!-- 評分 Modal -->
<div id="gradingModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-gray-900/60 hidden backdrop-blur-sm p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-95 transition-transform modal-enter">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
            <div>
                <span class="text-blue-200 text-sm font-bold" id="gradingGradeClass"></span>
                <h2 id="gradingName" class="text-2xl font-black tracking-wider">選擇學生</h2>
            </div>
            <button onclick="closeGradingModal()" class="text-blue-200 hover:text-white transition-colors bg-blue-700/50 rounded-full p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>

            <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg border border-blue-100">

                    <input type="checkbox" id="gradingTAToggle" class="sr-only peer" onchange="updateTAStatus(this.checked)">
                    <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                </label>
            </div>
        </div>
    </div>
</div>

<!-- Sheets 同步中心 Modal -->
<div id="syncModal" class="fixed inset-0 z-[70] flex items-center justify-center bg-gray-900/60 hidden backdrop-blur-sm p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 modal-enter">
        <h3 class="text-xl font-bold mb-2 flex items-center gap-2 border-b pb-3 text-green-700">Google Sheets 雲端同步中心</h3>
        <div class="mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-1">Apps Script 網址 (URL)</label>
            <input type="text" id="gasUrlInput" class="w-full border rounded-lg p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none" placeholder="貼上網址...">
        </div>
        <div class="mb-5 bg-blue-50 p-3 rounded-lg border border-blue-100">
            <label class="flex items-center gap-2 text-sm font-bold text-blue-800 cursor-pointer">
                <input type="checkbox" id="syncExpsToggle" checked class="w-4 h-4"> 同時備份實驗表格數據
            </label>
            <p class="text-[10px] text-blue-600 mt-1">啟用後，數據將會同步至試算表的「實驗」分頁。</p>
        </div>
        <div class="flex flex-col gap-3 mb-4">
            <button onclick="pullFromSheets()" class="bg-blue-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-blue-700 transition active:scale-95">下載名單與紀錄 (Pull)</button>
            <button onclick="pushToSheets()" class="bg-green-600 text-white font-bold py-3 rounded-lg shadow-sm hover:bg-green-700 transition active:scale-95">備份成績與實驗 (Push)</button>
        </div>
        <button onclick="closeSyncModal()" class="w-full border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition">關閉</button>
    </div>
</div>

<div id="loadingModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-900/70 hidden backdrop-blur-sm">
    <div class="bg-white rounded-xl p-6 flex flex-col items-center shadow-2xl">
        <svg class="w-12 h-12 text-blue-600 animate-spin mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p id="loadingMsg" class="font-bold text-gray-800">同步進行中...</p>
    </div>
</div>

<div id="customModal" class="fixed inset-0 z-[80] flex items-center justify-center bg-gray-900/60 hidden backdrop-blur-sm p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 transform scale-95">
        <h3 id="modalTitle" class="text-lg font-bold mb-3 border-b pb-2">提示</h3>
        <p id="modalMessage" class="text-gray-600 mb-6 text-sm whitespace-pre-wrap"></p>
        <button onclick="document.getElementById('customModal').classList.add('hidden')" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg">確認</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /* 🔥 FIREBASE 設定區 */
    const myFirebaseConfig = {
        apiKey: "AIzaSyACZgJU1uxCi1sHZe528cN7Aw7HQ0eMjtM",
        authDomain: "eletric-experiment.firebaseapp.com",
        projectId: "eletric-experiment",
        storageBucket: "eletric-experiment.firebasestorage.app",
        messagingSenderId: "21511409437",
        appId: "1:21511409437:web:4f27d726b5bfb9c4c6dbf4",
        measurementId: "G-S6BVBCQ6RS"
    };

    /* 🌐 GOOGLE SHEETS 設定區 */
    const myDefaultGasUrl = "https://script.google.com/macros/s/AKfycbzGj5KcJxD9iXeR5jiQEe_g9FhK5eYF3UFpyqPaQzxm5Fcns5-KdcOCGUYbbZw6AQ0g/exec";

    let app, auth, db, user, isFirebaseReady = false;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    
    function getCollectionRef(colName) { return (typeof __app_id !== 'undefined') ? collection(db, 'artifacts', appId, 'public', 'data', colName) : collection(db, colName); }
    function getDocRef(colName, documentId) { return (typeof __app_id !== 'undefined') ? doc(db, 'artifacts', appId, 'public', 'data', colName, documentId) : doc(db, colName, documentId); }

    window.classDataCache = {};
    let unsubscribeStudents = null, currentGrade = '', currentClass = '', currentSelectedStudentId = null;

    // --- 佈局控制參數 ---
    let isSidebarOpen = true;
    let currentSidebarWidth = 480;

    // 定義 updateLayout 函數在頂層範圍
    window.updateLayout = function() {
        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('resizer');
        const isMobile = window.innerWidth < 768;
        
        if (sidebar) {
            sidebar.style.width = isSidebarOpen ? (isMobile ? '100%' : currentSidebarWidth + 'px') : '0px';
        }
        if (resizer) {
            resizer.style.display = isSidebarOpen && !isMobile ? 'flex' : 'none';
        }
    };

    window.initApp = async function() {
        await fetchClassList();
        renderTableTemplate();
        setupEventListeners();
        initCamera();
        window.updateLayout();
    };

    async function fetchClassList() {
        if (!isFirebaseReady) return;
        try {
            const classesRef = getCollectionRef('classes');
            const snapshot = await getDocs(classesRef);
            window.classDataCache = {};
            const gradesSet = new Set();
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if(!window.classDataCache[data.grade]) window.classDataCache[data.grade] = {};
                window.classDataCache[data.grade][data.className] = data.students || [];
                gradesSet.add(data.grade);
            });
            const grades = Array.from(gradesSet).sort();
            if (grades.length > 0) updateDropdowns(grades);
            else {
                document.getElementById('gradeSelect').innerHTML = '<option value="">請同步名單</option>';
            }
        } catch (e) { console.error(e); }
    }

    function updateDropdowns(grades) {
        const gradeSelect = document.getElementById('gradeSelect');
        if (!gradeSelect) return;
        gradeSelect.innerHTML = '';
        grades.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g; opt.textContent = `${g} 年級`;
            gradeSelect.appendChild(opt);
        });
        if(grades.length > 0) { gradeSelect.value = grades[0]; updateClassDropdown(); }
    }

    window.updateClassDropdown = function() {
        const g = document.getElementById('gradeSelect').value;
        currentGrade = g;
        const classSelect = document.getElementById('classSelect');
        if (!classSelect) return;
        classSelect.innerHTML = '';
        if (window.classDataCache[g]) {
            const classes = Object.keys(window.classDataCache[g]).sort();
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = `${c} 班`;
                classSelect.appendChild(opt);
            });
            if(classes.length > 0) { classSelect.value = classes[0]; currentClass = classes[0]; loadClassStudents(); loadExpData(); }
        }
    }

    window.loadClassStudents = function() {
        currentGrade = document.getElementById('gradeSelect').value;
        currentClass = document.getElementById('classSelect').value;
        if (!currentGrade || !currentClass || !isFirebaseReady) return;
        if (unsubscribeStudents) unsubscribeStudents();
        unsubscribeStudents = onSnapshot(getDocRef('classes', `${currentGrade}_${currentClass}`), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (!window.classDataCache[currentGrade]) window.classDataCache[currentGrade] = {};
                window.classDataCache[currentGrade][currentClass] = data.students || [];
                renderStudentList(data.students || []);
                showSaveSuccess();
            }
        });
    }

    function renderStudentList(students) {
        const listContainer = document.getElementById('student-list');
        if (!listContainer) return;
        document.getElementById('studentCount').textContent = students.length + '人';
        listContainer.innerHTML = '';
        students.forEach((s, idx) => {
            const item = document.createElement('div');
            item.className = `student-item ${s.isTA ? 'bg-indigo-50' : 'bg-white'} flex items-center justify-between px-4 py-3 border-b`;
            item.onclick = () => openGradingModal(idx, s);
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-full ${s.isTA ? 'bg-indigo-200 text-indigo-800' : 'bg-blue-100 text-blue-700'} flex items-center justify-center font-bold text-xs">${s.no}</span>
                    <span class="font-bold ${s.isTA ? 'text-indigo-700' : 'text-gray-800'} text-base">${s.name}</span>
                    ${s.isTA ? '<span class="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-bold border">小老師</span>' : ''}
                </div>
                <span class="text-lg font-black ${s.score > 0 ? 'text-green-600' : (s.score < 0 ? 'text-red-500' : 'text-gray-400')} w-8 text-right">${s.score}</span>`;
            listContainer.appendChild(item);
        });
    }

    /* 同步中心邏輯 */
    window.openSyncModal = () => {
        const savedUrl = localStorage.getItem('gasUrl') || myDefaultGasUrl;
        document.getElementById('gasUrlInput').value = savedUrl;
        document.getElementById('syncModal').classList.remove('hidden');
    };
    window.closeSyncModal = () => {
        localStorage.setItem('gasUrl', document.getElementById('gasUrlInput').value.trim());
        document.getElementById('syncModal').classList.add('hidden');
    };

    window.pullFromSheets = async function() {
        const url = document.getElementById('gasUrlInput').value.trim();
        if (!url || !isFirebaseReady) return showModal('錯誤', '請確認連線與資料庫狀態');
        localStorage.setItem('gasUrl', url);
        showLoading('正在從試算表抓取最新資料...');
        try {
            const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'pull' }) });
            const res = await resp.json();
            if (res.status === 'success') {
                for (let k in res.classes) await setDoc(getDocRef('classes', k), res.classes[k]);
                if (document.getElementById('syncExpsToggle').checked && res.experiments) {
                    for (let id in res.experiments) await setDoc(getDocRef('experiments', id), { ...res.experiments[id], id: id });
                }
                hideLoading(); showModal('同步完成', '所有名單與實驗紀錄已更新至 Firebase。');
                await fetchClassList();
                document.getElementById('syncModal').classList.add('hidden');
            } else throw new Error(res.message);
        } catch (e) { hideLoading(); showModal('下載失敗', e.message); }
    };

    window.pushToSheets = async function() {
        const url = document.getElementById('gasUrlInput').value.trim();
        if (!url || !isFirebaseReady) return showModal('錯誤', '請確認連線與資料庫狀態');
        showLoading('正在備份數據至 Google 試算表...');
        try {
            let exps = {};
            if (document.getElementById('syncExpsToggle').checked) {
                const qSnap = await getDocs(getCollectionRef('experiments'));
                qSnap.forEach(d => exps[d.id] = d.data());
            }
            const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'push', classes: window.classDataCache, experiments: exps }) });
            const res = await resp.json();
            if (res.status === 'success') {
                hideLoading(); showModal('備份成功', `已同步成績與實驗紀錄至您的 Google 試算表。`);
                document.getElementById('syncModal').classList.add('hidden');
            } else throw new Error(res.message);
        } catch (e) { hideLoading(); showModal('備份失敗', e.message); }
    };

    function showLoading(m) { document.getElementById('loadingMsg').textContent = m; document.getElementById('loadingModal').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingModal').classList.add('hidden'); }

    /* 評分與實驗 */
    window.openGradingModal = (idx, s) => { currentSelectedStudentId = idx; document.getElementById('gradingGradeClass').textContent = `${currentGrade}年${currentClass}班 - ${s.no}號`; document.getElementById('gradingName').textContent = s.name; document.getElementById('gradingCurrentScore').textContent = s.score; document.getElementById('gradingTAToggle').checked = s.isTA; document.getElementById('gradingModal').classList.remove('hidden'); };
    window.closeGradingModal = () => document.getElementById('gradingModal').classList.add('hidden');
    window.updateScore = async (amt) => { if (currentSelectedStudentId === null) return; const list = window.classDataCache[currentGrade][currentClass]; list[currentSelectedStudentId].score += amt; document.getElementById('gradingCurrentScore').textContent = list[currentSelectedStudentId].score; await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: list }); };
    window.updateTAStatus = async (val) => { if (currentSelectedStudentId === null) return; const list = window.classDataCache[currentGrade][currentClass]; list[currentSelectedStudentId].isTA = val; await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: list }); };

    window.renderTableTemplate = () => {
        const val = document.getElementById('expSelect').value;
        const container = document.getElementById('table-container');
        if (!container) return;
        if (val === 'exp1') {
            container.innerHTML = `<h3 class="font-bold text-center text-blue-900 mb-3 text-lg">1. 固定電阻 (1000Ω)</h3><table class="border-collapse text-center w-full"><thead><tr class="bg-blue-100"><th>輸入電壓</th><th>實際電壓(V)</th><th>電流(mA)</th><th>比值(Ω)</th></tr></thead><tbody><tr><td>1.5V</td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr><tr><td>3V</td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr><tr><td>4.5V</td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr></tbody></table>`;
        } else if (val === 'exp2' || val === 'exp3') {
            const sym = val === 'exp2' ? '+' : '//';
            container.innerHTML = `<h3 class="font-bold text-center text-blue-900 mb-3 text-lg">${val==='exp2'?'串聯':'並聯'}實驗</h3><table class="border-collapse text-center w-full"><thead><tr class="bg-blue-100"><th>組合</th><th>三用電表(Ω)</th><th>電壓(V)</th><th>電流(mA)</th><th>比值(Ω)</th></tr></thead><tbody><tr><td>1個：1K</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr><tr><td>2個：1K${sym}1K</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr><tr><td>3個：1K${sym}1K${sym}1K</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr></tbody></table>`;
        } else {
            container.innerHTML = `<h3 class="font-bold text-center text-green-700 mb-3 text-lg">4. 並聯迴路觀察</h3><table class="border-collapse text-center w-full"><thead><tr class="bg-green-100"><th>位置</th><th>電阻(Ω)</th><th>電壓(V)</th><th>電流(mA)</th></tr></thead><tbody><tr><td>迴路 1</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr><tr><td>迴路 2</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr><tr><td>總和</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr></tbody></table>`;
        }
        loadExpData();
    };

    window.calculateRatio = () => {
        document.querySelectorAll('#table-container tr').forEach(row => {
            const vIn = row.querySelector('.input-v'), iIn = row.querySelector('.input-i'), res = row.querySelector('.result-r');
            if (res) {
                let v = vIn ? parseFloat(vIn.value) : (row.cells[0]?.innerText.includes('V') ? parseFloat(row.cells[0].innerText) : NaN);
                const i = iIn ? parseFloat(iIn.value) : NaN;
                res.textContent = (!isNaN(v) && !isNaN(i) && i !== 0) ? ((v / i) * 1000).toFixed(2) : '-';
            }
        });
    };

    window.saveExpData = async () => {
        if (!currentGrade || !currentClass || !isFirebaseReady) return showModal('錯誤', '請選擇班級');
        const expType = document.getElementById('expSelect').value;
        const data = Array.from(document.querySelectorAll('#table-container input')).map(i => i.value);
        await setDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${expType}`), { grade: currentGrade, className: currentClass, expType, data, updatedAt: new Date().toISOString() });
        showSaveSuccess();
    };

    window.loadExpData = async () => {
        if (!currentGrade || !currentClass || !isFirebaseReady) return;
        try {
            const snap = await getDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${document.getElementById('expSelect').value}`));
            if (snap.exists()) {
                const ins = document.querySelectorAll('#table-container input');
                snap.data().data.forEach((v, i) => { if (ins[i]) ins[i].value = v; });
                calculateRatio();
            }
        } catch (e) {}
    };

    /* 基本事件綁定 */
    function setupEventListeners() {
        document.getElementById('gradeSelect').addEventListener('change', updateClassDropdown);
        document.getElementById('classSelect').addEventListener('change', () => { loadClassStudents(); loadExpData(); });
        document.getElementById('expSelect').addEventListener('change', renderTableTemplate);
        document.getElementById('calcBtn').addEventListener('click', calculateRatio);
        document.getElementById('saveExpBtn').addEventListener('click', saveExpData);
        document.getElementById('fontSlider').addEventListener('input', (e) => document.documentElement.style.setProperty('--font-size', e.target.value + 'px'));
        document.getElementById('colWidthSlider').addEventListener('input', (e) => document.documentElement.style.setProperty('--col1-width', e.target.value + 'px'));
        document.getElementById('swapLayoutBtn').addEventListener('click', () => document.getElementById('mainContainer').classList.toggle('md:flex-row-reverse'));
        document.getElementById('fullscreenBtn').addEventListener('click', () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen());
        
        const resizer = document.getElementById('resizer');
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        let isResizing = false;
        
        if (resizer) {
            resizer.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const dx = e.movementX;
                const isReverse = document.getElementById('mainContainer').classList.contains('md:flex-row-reverse');
                currentSidebarWidth += isReverse ? dx : -dx;
                currentSidebarWidth = Math.max(320, Math.min(currentSidebarWidth, window.innerWidth * 0.8));
                window.updateLayout();
            });
            document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = ''; });
        }
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => { isSidebarOpen = !isSidebarOpen; window.updateLayout(); });
        }
        window.addEventListener('resize', window.updateLayout);
    }

    async function initCamera() {
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            const cameraSelect = document.getElementById('cameraSelect');
            if (cameraSelect) {
                cameraSelect.innerHTML = videoDevices.map((d, i) => `<option value="${d.deviceId}">${d.label || '鏡頭'+(i+1)}</option>`).join('');
            }
            startStream();
        } catch (e) { 
            const msg = document.getElementById('noCameraMsg');
            if (msg) msg.classList.remove('hidden'); 
        }
    }
    
    async function startStream() {
        const video = document.getElementById('video');
        const select = document.getElementById('cameraSelect');
        if (!video || !select || !select.value) return;
        try {
            video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: select.value }, width: { ideal: 3840 }, height: { ideal: 2160 } } });
        } catch (e) { 
            video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: select.value } } }); 
        }
    }
    
    const camSelect = document.getElementById('cameraSelect');
    if (camSelect) camSelect.addEventListener('change', startStream);
    const refreshBtn = document.getElementById('refreshCamBtn');
    if (refreshBtn) refreshBtn.addEventListener('click', initCamera);

    function showSaveSuccess() { 
        const ind = document.getElementById('saveStatusIndicator');
        if (ind) { ind.classList.remove('hidden'); setTimeout(() => ind.classList.add('hidden'), 2000); }
    }
    window.showModal = (t, m) => { 
        const title = document.getElementById('modalTitle'), msg = document.getElementById('modalMessage'), modal = document.getElementById('customModal');
        if (title) title.textContent = t; if (msg) msg.textContent = m; if (modal) modal.classList.remove('hidden'); 
    };

    /* Firebase 初始化 */
    try {
        const hasEnv = typeof __firebase_config !== 'undefined' && __firebase_config;
        const config = hasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        app = initializeApp(config); auth = getAuth(app); db = getFirestore(app);
        const authenticate = async () => {
            try {
                if (hasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else await signInAnonymously(auth);
                isFirebaseReady = true; window.initApp();
            } catch (err) {
                await signInAnonymously(auth); isFirebaseReady = true; window.initApp();
            }
        };
        authenticate();
    } catch (e) { console.error(e); }

</script>
</body>
</html>
