<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實驗紀錄系統 v4.21 (先乘除後加減防呆版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        :root {
            --table-width: 100%;
            --font-size: 22px; 
            --col1-width: auto; 
        }

        body { font-size: 18px; }

        /* ================= 實驗表格核心樣式美化 ================= */
        #table-container table { 
            width: 100%; 
            min-width: max-content; 
            margin: 0 auto; 
            table-layout: auto; 
            border-collapse: separate; 
            border-spacing: 0;
            border: 1px solid #bfdbfe; 
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
        }

        #table-container table, 
        #table-container th, 
        #table-container td, 
        #table-container input, 
        #table-container span {
            font-size: var(--font-size) !important;
        }

        #table-container th { 
            background-color: #3b82f6; 
            color: white; 
            padding: 12px 16px; 
            font-weight: 700; 
            border-bottom: 2px solid #2563eb; 
            letter-spacing: 0.05em;
            white-space: nowrap; 
        }

        #table-container td { 
            padding: 10px 12px; 
            border-bottom: 1px solid #f1f5f9; 
            border-right: 1px solid #f1f5f9;
            text-align: center;
            color: #334155;
            vertical-align: middle;
            white-space: nowrap; 
        }

        #table-container table.theme-green { border-color: #bbf7d0; box-shadow: 0 4px 6px -1px rgba(34, 197, 94, 0.1); }
        #table-container table.theme-green th { background-color: #22c55e; border-bottom: 2px solid #16a34a; }
        #table-container td:last-child { border-right: none; }
        #table-container tr:last-child td { border-bottom: none; }
        
        #table-container td:first-child, #table-container th:first-child {
            width: var(--col1-width);
            font-weight: 700;
            background-color: #f8fafc;
        }
        #table-container table.theme-green td:first-child { background-color: #f0fdf4; }
        
        /* 輸入框精緻化 */
        .table-input { 
            width: 100%; 
            max-width: 12ch;
            margin: 0 auto;
            min-width: 80px; 
            text-align: center; 
            background: #f1f5f9; 
            outline: none; 
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 8px 4px;
            font-weight: 600;
            color: #1e293b;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .table-input:hover { background: #e2e8f0; }
        .table-input:focus { background: white; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        #table-container table.theme-green .table-input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15); }
        
        /* 底線填空框 */
        .fill-blank { 
            border-bottom: 2px solid #94a3b8; 
            text-align: center; 
            outline: none; 
            background: transparent; 
            font-weight: 800;
            color: #1d4ed8;
            width: 2.5em; 
            padding: 0 2px;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .fill-blank:focus { border-bottom-color: #3b82f6; }

        .student-item { transition: all 0.2s; border-radius: 14px; border: 1px solid transparent; }
        .student-item:hover { background-color: #f0f7ff; border-color: #dbeafe; cursor: pointer; transform: translateX(8px); }

        .ping-green { animation: shadow-ping-green 2s infinite; }
        @keyframes shadow-ping-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .ping-yellow { animation: shadow-ping-yellow 2s infinite; }
        @keyframes shadow-ping-yellow { 0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); } 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); } }
        .ping-red { animation: shadow-ping-red 2s infinite; }
        @keyframes shadow-ping-red { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-900 font-sans h-screen w-screen overflow-hidden text-slate-800 relative">

<!-- ================= 手機專屬遠端解鎖畫面 (預設隱藏) ================= -->
<div id="remoteMobileUI" class="fixed inset-0 z-[500] bg-slate-50 flex flex-col items-center justify-center px-6 hidden">
    <div class="w-full max-w-sm bg-white p-8 rounded-[32px] shadow-2xl border border-slate-100 flex flex-col items-center text-center">
        <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-6 shadow-inner border border-blue-100">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-3xl font-black text-slate-800 tracking-widest mb-2">遠端解鎖</h2>
        <p class="text-slate-400 font-bold mb-10 text-sm">請輸入 6 位數授權密碼以開啟系統</p>
        
        <input type="password" id="remotePasswordInput" class="w-full text-center text-4xl font-black tracking-[0.4em] py-5 px-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all mb-8" placeholder="••••••" maxlength="6" inputmode="numeric">
        
        <button id="remoteUnlockBtn" onclick="submitRemotePassword()" class="w-full bg-blue-600 text-white font-black text-2xl py-5 rounded-2xl shadow-[0_10px_25px_rgba(37,99,235,0.4)] hover:bg-blue-700 active:scale-95 transition-all tracking-widest">
            確認解鎖
        </button>
        <div id="remoteMsg" class="mt-6 font-bold text-lg h-6 text-rose-500"></div>
    </div>
</div>

<!-- ================= 大螢幕鎖定畫面 (預設隱藏) ================= -->
<div id="lockScreenUI" class="fixed inset-0 z-[400] bg-slate-900/95 backdrop-blur-2xl flex flex-col items-center justify-center text-white hidden">
    <div class="bg-slate-800/80 p-12 rounded-[40px] shadow-[0_30px_60px_rgba(0,0,0,0.6)] flex flex-col items-center border border-slate-700 text-center max-w-lg">
        <svg class="w-20 h-20 text-blue-500 mb-6 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        <h1 class="text-4xl font-black tracking-[0.2em] mb-3 text-white">系統已鎖定</h1>
        <p class="text-slate-400 mb-8 font-bold text-lg">請使用手機掃描下方 QR Code 解鎖</p>
        
        <div class="bg-white p-6 rounded-[28px] mb-6 shadow-2xl">
            <img id="qrcodeImg" src="" alt="QR Code" class="w-56 h-56">
        </div>
        
        <!-- 預覽/本機環境警告 -->
        <div id="qrWarning" class="hidden mb-6 px-4 py-3 bg-rose-500/20 border border-rose-500/50 rounded-xl text-rose-300 text-sm font-bold text-left leading-relaxed max-w-[260px]">
            ⚠️ 預覽/單機環境無法產生真實網址，手機將無法連線。<br><span class="text-xs text-rose-400 font-normal">請先使用下方按鈕手動解鎖測試。將網頁上傳至伺服器後即可正常掃描。</span>
        </div>

        <div class="flex items-center gap-3 text-slate-500">
            <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span class="text-sm font-bold tracking-widest">等待手機授權中...</span>
        </div>
        
        <button onclick="showPCPasswordPrompt()" class="mt-8 text-slate-500 hover:text-slate-300 transition-colors font-bold text-sm tracking-wider underline underline-offset-4">直接在螢幕上輸入密碼</button>
    </div>
</div>


<!-- 視訊全螢幕底層 -->
<div id="videoContainer" class="absolute inset-0 z-0 flex items-center justify-center bg-black">
    <video id="video" class="w-full h-full object-contain" autoplay playsinline></video>
    <div id="noCameraMsg" class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400 bg-slate-900/90 backdrop-blur-sm z-10">
        <svg class="w-20 h-20 mb-6 text-slate-500 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"></path></svg>
        <span class="text-3xl font-black tracking-widest text-white">找不到可用的攝影機</span>
        <span class="text-lg font-normal mt-3 text-slate-400">可能被其他軟體佔用或未授權</span>
        <button onclick="showCameraTroubleshoot()" class="mt-8 bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl text-xl transition-colors font-bold tracking-widest shadow-[0_0_20px_rgba(37,99,235,0.4)] flex items-center gap-3">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            查看疑難排解
        </button>
    </div>
</div>

<!-- ================= 頂部控制列 ================= -->

<!-- 左上方：相機控制區 -->
<div class="absolute top-5 left-5 z-40 bg-white/90 p-2.5 rounded-2xl shadow-xl flex items-center gap-3 backdrop-blur-md border border-white/50">
    <select id="cameraSelect" class="border-none bg-slate-100 rounded-xl p-2.5 text-base outline-none font-black text-slate-700 cursor-pointer focus:ring-2 focus:ring-blue-500"></select>
    <button id="refreshCamBtn" class="bg-blue-100 hover:bg-blue-200 p-2.5 rounded-xl text-blue-700 transition-colors" title="重新偵測鏡頭"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5" stroke-linecap="round"/></svg></button>
    <button id="swapLayoutBtn" class="bg-slate-200 hover:bg-slate-300 p-2.5 rounded-xl text-slate-800 transition-colors" title="旋轉鏡頭"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-width="2.5" stroke-linecap="round"/></svg></button>
    <button id="fullscreenBtn" class="bg-slate-200 hover:bg-slate-300 p-2.5 rounded-xl text-slate-800 transition-colors" title="全螢幕模式"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
</div>

<!-- 右上方：主功能按鈕群 (垂直排列) -->
<div class="absolute top-5 right-5 z-40 flex flex-col items-end gap-4 w-44">
    <!-- 實驗記錄 -->
    <button onclick="openFloatingTable()" class="w-full bg-blue-600 text-white px-5 py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(37,99,235,0.4)] hover:bg-blue-500 active:scale-95 transition-all duration-200 font-black text-xl tracking-widest flex items-center justify-center gap-3 border border-white/10 backdrop-blur-md">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        實驗記錄
    </button>

    <!-- 加扣紀錄 -->
    <button onclick="openFloatingGrading()" class="w-full bg-emerald-600 text-white px-5 py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(5,150,105,0.4)] hover:bg-emerald-500 active:scale-95 transition-all duration-200 font-black text-xl tracking-widest flex items-center justify-center gap-3 border border-white/10 backdrop-blur-md">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        加扣紀錄
    </button>

    <!-- 雲端同步 -->
    <button onclick="openSyncModal()" class="w-full bg-indigo-600 text-white px-5 py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(79,70,229,0.4)] hover:bg-indigo-500 active:scale-95 transition-all duration-200 font-black text-xl tracking-widest flex items-center justify-center gap-3 border border-white/10 backdrop-blur-md relative mt-1">
        <span id="mainConnStatusDot" class="absolute -top-2 -right-2 w-4 h-4 rounded-full bg-yellow-400 ping-yellow border-2 border-white shadow-sm"></span>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        雲端同步
    </button>

    <!-- 小計算機 -->
    <button onclick="toggleCalculator()" class="w-full bg-orange-500 text-white px-5 py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(249,115,22,0.4)] hover:bg-orange-400 active:scale-95 transition-all duration-200 font-black text-xl tracking-widest flex items-center justify-center gap-3 border border-white/10 backdrop-blur-md mt-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
        小計算機
    </button>
</div>

<!-- ================= 隱藏儲存區 (存放共用的控制項與內容) ================= -->
<div id="hidden-stash" class="hidden">
    <!-- 單排緊湊的控制列 -->
    <div id="shared-controls-row" class="flex gap-3 w-full bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
        <select id="gradeSelect" class="flex-[1] bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-lg font-black focus:ring-2 focus:ring-blue-500 outline-none text-slate-700"></select>
        <select id="classSelect" class="flex-[1] bg-slate-50 border border-slate-200 rounded-xl py-2 px-3 text-lg font-black focus:ring-2 focus:ring-blue-500 outline-none text-slate-700"></select>
        <div id="expSelectContainer" class="flex-[2]">
            <select id="expSelect" class="w-full bg-blue-600 border border-transparent rounded-xl py-2 px-3 font-black text-white text-lg shadow-md shadow-blue-200 outline-none cursor-pointer hover:bg-blue-700 transition-colors">
                <option value="exp1">1. 固定電阻 (1000Ω)</option>
                <option value="exp2">2. 電阻串聯 (固定 3V)</option>
                <option value="exp3">3. 電阻並聯 (固定 3V)</option>
                <option value="exp4">4. 並聯迴路電流</option>
            </select>
        </div>
    </div>

    <!-- 實驗表格容器 -->
    <div id="table-container" class="w-full relative pb-4"></div>

    <!-- 名單容器 -->
    <div id="studentListContainer" class="w-full flex flex-col h-full">
        <div class="bg-slate-50/50 px-5 py-4 border-b flex justify-between items-center shrink-0 rounded-t-2xl">
            <h3 class="font-black text-slate-700 flex items-center gap-2 text-lg tracking-wider">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="2"/></svg>
                名單
            </h3>
            <span id="studentCount" class="text-sm font-black bg-slate-900 text-white px-3 py-1 rounded-full shadow-md">--</span>
        </div>
        <div class="p-3 border-b bg-white shrink-0">
            <div class="relative group">
                <input type="text" id="studentSearchInput" placeholder="搜尋姓名/座號..." class="w-full pl-10 pr-3 py-3 bg-slate-50 border border-slate-200 rounded-xl text-base focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold">
                <svg class="w-6 h-6 text-slate-300 absolute left-3 top-3 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"/></svg>
            </div>
        </div>
        <div id="student-list" class="divide-y divide-slate-50 p-2 overflow-y-auto no-scrollbar bg-white flex-1 min-h-[300px]">
            <div class="p-10 text-center text-slate-400 font-bold italic">請先同步名單</div>
        </div>
    </div>
</div>


<!-- ================= 拖曳縮放式：實驗記錄 Modal ================= -->
<div id="floatingTableModal" class="fixed z-[60] hidden flex-col modal-enter" style="width: 850px; height: auto; min-height: 500px; top: 12vh; left: 5vw; touch-action: none;">
    <div class="bg-white/95 backdrop-blur-2xl rounded-[28px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] border border-white/60 flex flex-col w-full h-full relative overflow-hidden">
        <!-- Header -->
        <div id="floatingTableHeader" class="bg-blue-600/95 cursor-move p-4 flex justify-between items-center shrink-0 shadow-sm z-10" title="按住此處可拖曳視窗">
            <div class="flex items-center gap-3 pointer-events-none">
                <svg class="w-7 h-7 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <h2 class="text-2xl font-black tracking-widest text-white drop-shadow-sm">實驗記錄面板</h2>
                <div id="saveStatusIndicator" class="hidden ml-4 text-sm font-black text-emerald-300 bg-emerald-800/50 px-3 py-1 rounded-lg border border-emerald-500/30">已儲存</div>
            </div>
            <button onclick="closeFloatingTable()" class="text-blue-200 hover:text-white hover:bg-blue-700/50 transition-colors rounded-full p-2 cursor-pointer ml-8">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <!-- Controls injected here -->
        <div class="p-4 bg-slate-100/60 border-b border-slate-200 shrink-0 flex flex-col gap-2" id="floating-controls-container-table"></div>
        <!-- Table injected here -->
        <div class="p-6 overflow-auto flex-1 bg-slate-50/80 flex flex-col relative" id="floatingTableContent"></div>
        
        <!-- Bottom Actions -->
        <div class="p-4 bg-white/95 border-t border-slate-200 shrink-0 flex gap-4 w-full shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10 relative">
            <button onclick="window.clearExpData()" class="flex-[1] bg-slate-100 text-slate-700 font-black py-4 rounded-2xl hover:bg-slate-200 active:scale-95 transition-all text-xl tracking-wider border border-slate-200">清空數據</button>
            <button onclick="window.calculateRatio()" class="flex-[1] bg-blue-100 text-blue-700 font-black py-4 rounded-2xl hover:bg-blue-200 active:scale-95 transition-all text-xl tracking-widest">自動計算</button>

    window.toggleCalculator = function() {

    window.calcInput = function(key) {
        const display = document.getElementById('calcDisplay');
        const history = document.getElementById('calcHistory');

        if (calcLastAction === 'err') {
            calcExpression = '';
            calcCurrentInput = '0';
            calcLastAction = 'num';
            history.innerText = '';
        }

        if (key >= '0' && key <= '9') {
            if (calcLastAction === 'eq' || calcCurrentInput === '0' || calcLastAction === 'op') {
                calcCurrentInput = key;
                if (calcLastAction === 'eq') {
                    calcExpression = '';
                    history.innerText = '';
                }
            } else {
                calcCurrentInput += key;
            }
            calcLastAction = 'num';
        } else if (key === '.') {
            if (calcLastAction === 'eq' || calcLastAction === 'op') {
                calcCurrentInput = '0.';
                if (calcLastAction === 'eq') {
                    calcExpression = '';
                    history.innerText = '';
                }
            } else if (!calcCurrentInput.includes('.')) {
                calcCurrentInput += '.';
            }
            calcLastAction = 'num';
        } else if (key === 'C') {
            calcExpression = '';
            calcCurrentInput = '0';
            calcLastAction = 'num';
            history.innerText = '';
        } else if (key === '⌫') {
            if (calcLastAction === 'num' || calcLastAction === 'eq') {
                calcCurrentInput = calcCurrentInput.length > 1 ? calcCurrentInput.slice(0, -1) : '0';
                if (calcCurrentInput === '-' || calcCurrentInput === '') calcCurrentInput = '0';
                if (calcLastAction === 'eq') {
                    calcExpression = '';
                    history.innerText = '';
                    calcLastAction = 'num';
                }
            }
        } else if (key === '√') {
            const val = parseFloat(calcCurrentInput);
            if (val >= 0) {
                if (calcLastAction === 'eq') {
                    calcExpression = '';
                    history.innerText = '√(' + val + ') =';
                }
                calcCurrentInput = String(parseFloat(Math.sqrt(val).toFixed(6)));
                calcLastAction = 'num';
            } else {
                calcCurrentInput = 'Error';
                calcLastAction = 'err';
            }
        } else if (['+', '-', '*', '/'].includes(key)) {
            const displayOp = key === '*' ? '×' : key === '/' ? '÷' : key;
            
            if (calcLastAction === 'op') {
                calcExpression = calcExpression.replace(/[\+\-\×\÷]\s*$/, displayOp + ' ');
            } else {
                calcExpression += calcCurrentInput + ' ' + displayOp + ' ';
            }
            calcLastAction = 'op';
            history.innerText = calcExpression;
        } else if (key === '=') {
            if (calcLastAction !== 'eq' && calcExpression !== '') {
                // 組合出完整算式 (例如 "5 + 8 ÷ 15")
                let fullExprVisual = calcExpression + calcCurrentInput;
                let tokens = fullExprVisual.split(' ').filter(t => t);

                const isAddSub = (op) => op === '+' || op === '-';
                const isMulDiv = (op) => op === '×' || op === '÷';

                // ================= 防呆機制：偵測到混用加減乘除時，彈出詢問視窗 =================
                // 條件：剛好有5個元素 (例如: 數字 符號 數字 符號 數字)，且符號為 [加減, 乘除] 或 [乘除, 加減]
                if (tokens.length === 5 &&
                    ((isAddSub(tokens[1]) && isMulDiv(tokens[3])) || (isMulDiv(tokens[1]) && isAddSub(tokens[3])))
                ) {
                    let opt1 = `(${tokens[0]} ${tokens[1]} ${tokens[2]}) ${tokens[3]} ${tokens[4]}`;
                    let opt2 = `${tokens[0]} ${tokens[1]} (${tokens[2]} ${tokens[3]} ${tokens[4]})`;
                    
                    // 叫出確認視窗，中斷本次運算
                    window.showCalcChoiceModal(opt1, opt2);
                    return; 
                }

                // 若無混淆，正常執行計算
                executeCalculation(fullExprVisual, fullExprVisual);
            }
        }
        
        display.value = calcCurrentInput;
    };

    // 負責真正執行計算的函數
    window.executeCalculation = function(evalVisualStr, historyStr) {
        let evalExpr = evalVisualStr.replace(/×/g, '*').replace(/÷/g, '/');
        try {
            let result = new Function('return ' + evalExpr)();
            if (!isFinite(result)) throw new Error('Math Error');
            
            calcCurrentInput = String(parseFloat(result.toFixed(6)));
            document.getElementById('calcHistory').innerText = historyStr + ' =';
            calcExpression = ''; 
            calcLastAction = 'eq';
        } catch(e) {
            calcCurrentInput = 'Error';
            calcLastAction = 'err';
        }
        document.getElementById('calcDisplay').value = calcCurrentInput;
    };

    // --- 視窗拖曳與縮放邏輯 ---
    function initInteractiveModal(modalId, headerId) {
        const modal = document.getElementById(modalId);
        const header = document.getElementById(headerId);
        const resizeHandles = modal ? modal.querySelectorAll('.resize-handle') : [];
        if(!modal || !header) return;
        
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;

        const startDrag = (e, clientX, clientY) => {
            if(e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            isDragging = true;
            const rect = modal.getBoundingClientRect();
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            document.body.style.userSelect = 'none';
        };

        const doDrag = (clientX, clientY) => {
            if (!isDragging) return;
            let newX = clientX - dragOffsetX;
            let newY = clientY - dragOffsetY;
            newX = Math.max(-modal.offsetWidth + 100, Math.min(newX, window.innerWidth - 100));
            newY = Math.max(0, Math.min(newY, window.innerHeight - 100));
            modal.style.left = newX + 'px';
            modal.style.top = newY + 'px';
        };

        const stopDrag = () => { if (isDragging) { isDragging = false; document.body.style.userSelect = ''; } };

        header.addEventListener('mousedown', e => startDrag(e, e.clientX, e.clientY));
        header.addEventListener('touchstart', e => startDrag(e, e.touches[0].clientX, e.touches[0].clientY), {passive: true});
        document.addEventListener('mousemove', e => doDrag(e.clientX, e.clientY));
        document.addEventListener('touchmove', e => doDrag(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);

        resizeHandles.forEach(handle => {
            let isResizing = false, startX, startY, startWidth, startHeight;
            const startResize = (e) => {
                e.preventDefault(); e.stopPropagation(); isResizing = true;
                startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                const rect = modal.getBoundingClientRect();
                startWidth = rect.width; startHeight = rect.height;
                document.body.style.userSelect = 'none'; document.body.style.cursor = 'nwse-resize';
            };
            const doResize = (e) => {
                if (!isResizing) return;
                const cX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const cY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                modal.style.width = Math.max(350, startWidth + (cX - startX)) + 'px';
                modal.style.height = Math.max(300, startHeight + (cY - startY)) + 'px';
            };
            const stopResize = () => { if(isResizing) { isResizing = false; document.body.style.userSelect = ''; document.body.style.cursor = ''; } };

            handle.addEventListener('mousedown', startResize);
            handle.addEventListener('touchstart', startResize, {passive: false});
            document.addEventListener('mousemove', doResize);
            document.addEventListener('touchmove', doResize, {passive: false});
            document.addEventListener('mouseup', stopResize);
            document.addEventListener('touchend', stopResize);
        });
    }

    async function fetchClassList() {
        if (!isFirebaseReady) return;
        try {
            const snapshot = await getDocs(getCollectionRef('classes'));
            window.classDataCache = {};
            const gradesSet = new Set();
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if(!window.classDataCache[data.grade]) window.classDataCache[data.grade] = {};
                window.classDataCache[data.grade][data.className] = data.students || [];
                gradesSet.add(data.grade);
            });
            const grades = Array.from(gradesSet).sort();
            if (grades.length > 0) updateDropdowns(grades);
            else {
                document.getElementById('gradeSelect').innerHTML = '<option value="">請同步雲端</option>';
                document.getElementById('classSelect').innerHTML = '<option value="">(無資料)</option>';
            }
        } catch (e) { console.error(e); }
    }

    function updateDropdowns(grades) {
        const gradeSelect = document.getElementById('gradeSelect');
        gradeSelect.innerHTML = grades.map(g => `<option value="${g}">${g} 年級</option>`).join('');
        if(grades.length > 0) { gradeSelect.value = grades[0]; updateClassDropdown(); }
    }

    window.updateClassDropdown = function() {
        const g = document.getElementById('gradeSelect').value;
        currentGrade = g;
        const classSelect = document.getElementById('classSelect');
        if (window.classDataCache[g]) {
            const classes = Object.keys(window.classDataCache[g]).sort();
            classSelect.innerHTML = classes.map(c => `<option value="${c}">${c} 班</option>`).join('');
            if(classes.length > 0) { classSelect.value = classes[0]; currentClass = classes[0]; loadClassStudents(); loadExpData(); }
        }
    }

    window.loadClassStudents = function() {
        currentGrade = document.getElementById('gradeSelect').value;
        currentClass = document.getElementById('classSelect').value;
        if (!currentGrade || !currentClass || !isFirebaseReady) return;
        if (unsubscribeStudents) unsubscribeStudents();
        unsubscribeStudents = onSnapshot(getDocRef('classes', `${currentGrade}_${currentClass}`), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.classDataCache[currentGrade][currentClass] = data.students || [];
                renderFilteredStudentList();
            }
        });
    }

                        <p class="font-black ${s.isTA ? 'text-emerald-700' : 'text-slate-800'} text-xl">${s.name}</p>
                        ${s.isTA ? '<span class="text-xs font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100 uppercase tracking-tighter mt-1 inline-block">小老師</span>' : ''}
                    </div>
                </div>
                <span class="text-3xl font-black ${s.score > 0 ? 'text-emerald-500' : (s.score < 0 ? 'text-rose-500' : 'text-slate-300')} w-16 text-right">${s.score}</span>
            </div>`;
        }).join('');
    }

    /* --- 同步功能 --- */
    window.openSyncModal = () => document.getElementById('syncModal').classList.remove('hidden');
    window.closeSyncModal = () => document.getElementById('syncModal').classList.add('hidden');

    window.pullFromSheets = async function() {
        if (!isFirebaseReady) return;
        showLoadingModal('正在從試算表下載全校名單與歷史紀錄...');
        try {
            const res = await fetch(myDefaultGasUrl, { method: 'POST', body: JSON.stringify({ action: 'pull' }) }).then(r => r.json());
            if (res.status === 'success') {
                for (let k in res.classes) await setDoc(getDocRef('classes', k), res.classes[k]);
                if (document.getElementById('syncExpsToggle').checked && res.experiments) {
                    for (let id in res.experiments) await setDoc(getDocRef('experiments', id), res.experiments[id]);
                }
                hideLoadingModal(); showModal('同步完成', '所有班級名單與紀錄已由雲端更新！');
                await fetchClassList();
                document.getElementById('syncModal').classList.add('hidden');
            }
        } catch (e) { hideLoadingModal(); showModal('同步失敗', e.toString()); }
    };

    window.pushToSheets = async function() {
        if (!isFirebaseReady) return;
        showLoadingModal('正在備份全校數據至 Google 試算表...');
        try {
            let exps = {};
            if (document.getElementById('syncExpsToggle').checked) {
                const qSnap = await getDocs(getCollectionRef('experiments'));
                qSnap.forEach(d => { exps[d.id] = d.data(); });
            }
            const res = await fetch(myDefaultGasUrl, { method: 'POST', body: JSON.stringify({ action: 'push', classes: window.classDataCache, experiments: exps }) }).then(r => r.json());
            if (res.status === 'success') {
                hideLoadingModal(); showModal('備份成功', '數據已成功上傳！請至 Google Sheets 確認。');
                document.getElementById('syncModal').classList.add('hidden');
            }
        } catch (e) { hideLoadingModal(); showModal('備份失敗', e.toString()); }
    };

    function showLoadingModal(m) { document.getElementById('loadingMsg').textContent = m; document.getElementById('loadingModal').classList.remove('hidden'); }
    function hideLoadingModal() { document.getElementById('loadingModal').classList.add('hidden'); }

    /* --- 實驗表格渲染 --- */
    window.clearExpData = () => {
        document.querySelectorAll('#table-container input').forEach(i => {
            i.value = i.classList.contains('fill-blank') ? "1K" : "";
        });
        window.calculateRatio();
    };

    window.renderTableTemplate = () => {
        const val = document.getElementById('expSelect').value, container = document.getElementById('table-container');
        if (!container) return;
        
        let html = '';
        if (val === 'exp1') {
            html = `
            <h3 class="font-bold text-center text-blue-800 mb-4 text-2xl">1. 固定電阻 (1000Ω)</h3>
            <table>
                <thead><tr><th>輸入電壓</th><th>實際電壓(V)</th><th>電流(mA)</th><th>電阻=電壓/電流</th></tr></thead>
                <tbody>
                    <tr><td class="font-bold text-slate-500">1.5V</td><td><input type="text" inputmode="none" class="table-input input-v"></td><td><input type="text" inputmode="none" class="table-input input-i"></td><td class="result-r font-bold text-blue-600">-</td></tr>
                    <tr><td class="font-bold text-slate-500">3V</td><td><input type="text" inputmode="none" class="table-input input-v"></td><td><input type="text" inputmode="none" class="table-input input-i"></td><td class="result-r font-bold text-blue-600">-</td></tr>
                    <tr><td class="font-bold text-slate-500">4.5V</td><td><input type="text" inputmode="none" class="table-input input-v"></td><td><input type="text" inputmode="none" class="table-input input-i"></td><td class="result-r font-bold text-blue-600">-</td></tr>
                </tbody>
            </table>`;
        } else if (val === 'exp2' || val === 'exp3') { 
            const sym = val === 'exp2' ? '+' : '//'; 
            const title = val === 'exp2' ? '串聯' : '並聯';
            html = `
            <h3 class="font-bold text-center text-blue-800 mb-4 text-2xl">${title}實驗</h3>
            <table>
                <thead><tr><th>組合</th><th>三用電表(Ω)</th><th>電壓(V)</th><th>電流(mA)</th><th>電阻=電壓/電流</th></tr></thead>
                <tbody>
                    <tr><td class="text-left whitespace-nowrap px-2"><span>1個：</span><input type="text" inputmode="none" class="fill-blank" value="1K"></td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input input-v"></td><td><input type="text" inputmode="none" class="table-input input-i"></td><td class="result-r font-bold text-blue-600">-</td></tr>
                    <tr><td class="text-left whitespace-nowrap px-2"><span>2個：</span><input type="text" inputmode="none" class="fill-blank" value="1K">${sym}<input type="text" inputmode="none" class="fill-blank" value="1K"></td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input input-v"></td><td><input type="text" inputmode="none" class="table-input input-i"></td><td class="result-r font-bold text-blue-600">-</td></tr>
                    <tr><td class="text-left whitespace-nowrap px-2"><span>3個：</span><input type="text" inputmode="none" class="fill-blank" value="1K">${sym}<input type="text" inputmode="none" class="fill-blank" value="1K">${sym}<input type="text" inputmode="none" class="fill-blank" value="1K"></td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input input-v"></td><td><input type="text" inputmode="none" class="table-input input-i"></td><td class="result-r font-bold text-blue-600">-</td></tr>
                </tbody>
            </table>`; 
        } else { 
            html = `
            <h3 class="font-bold text-center text-green-700 mb-4 text-2xl">4. 並聯迴路觀察</h3>
            <table class="theme-green">
                <thead><tr><th>位置</th><th>電阻(Ω)</th><th>電壓(V)</th><th>電流(mA)</th></tr></thead>
                <tbody>
                    <tr><td class="font-bold text-slate-500">迴路 1</td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input"></td></tr>
                    <tr><td class="font-bold text-slate-500">迴路 2</td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input"></td></tr>
                    <tr><td class="font-bold text-blue-600 italic">總和</td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input"></td><td><input type="text" inputmode="none" class="table-input"></td></tr>
                </tbody>
            </table>`;
        }
        
        container.innerHTML = html;
        loadExpData();

        setTimeout(() => {
            document.querySelectorAll('#table-container input').forEach(input => {
                input.setAttribute('inputmode', 'none'); 
                input.addEventListener('click', (e) => { e.preventDefault(); window.showNumPad(e.target); });
                input.addEventListener('focus', (e) => { e.preventDefault(); window.showNumPad(e.target); });
            });
        }, 50);
    };

    window.calculateRatio = () => { 
        document.querySelectorAll('#table-container tr').forEach(row => { 
            const vIn = row.querySelector('.input-v'), iIn = row.querySelector('.input-i'), res = row.querySelector('.result-r'); 
            if (res) { 
                let v = vIn ? parseFloat(vIn.value) : (row.cells[0]?.innerText.includes('V') ? parseFloat(row.cells[0].innerText) : NaN); 
                const i = iIn ? parseFloat(iIn.value) : NaN; 
                res.textContent = (!isNaN(v) && !isNaN(i) && i !== 0) ? ((v / i) * 1000).toFixed(2) : '-'; 
            } 
        }); 
    };
    
    window.saveExpData = async function() { 
        if (!currentGrade || !currentClass || !isFirebaseReady) return showModal('系統提示', '請先選擇班級'); 
        const expType = document.getElementById('expSelect').value, data = Array.from(document.querySelectorAll('#table-container input')).map(i => i.value); 
        try {
            await setDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${expType}`), { grade: currentGrade, className: currentClass, expType, data, updatedAt: new Date().toLocaleString() }); 
            const ind = document.getElementById('saveStatusIndicator'); 
            if (ind) { ind.classList.remove('hidden'); setTimeout(() => ind.classList.add('hidden'), 3000); } 
        } catch (e) { showModal('儲存失敗', e.message); }
    };

    window.loadExpData = async () => { 
        if (!currentGrade || !currentClass || !isFirebaseReady) return; 
        try { 
            const snap = await getDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${document.getElementById('expSelect').value}`)); 
            if (snap.exists()) { 
                const ins = document.querySelectorAll('#table-container input'); 
                const data = snap.data().data;
                ins.forEach((input, i) => { 
                    let val = data[i];
                    if (input.classList.contains('fill-blank') && (!val || val.trim() === "")) val = "1K";
                    else if (val === undefined) val = "";
                    input.value = val;
                }); 
                calculateRatio(); 
            } else { 
                window.clearExpData();
            } 
        } catch (e) {} 
    };

    function setupEventListeners() {
        document.getElementById('gradeSelect').addEventListener('change', updateClassDropdown);
        document.getElementById('classSelect').addEventListener('change', () => { loadClassStudents(); loadExpData(); });
        document.getElementById('expSelect').addEventListener('change', renderTableTemplate);
        
        document.getElementById('swapLayoutBtn').addEventListener('click', () => document.getElementById('videoContainer').classList.toggle('rotate-180'));
        document.getElementById('fullscreenBtn').addEventListener('click', () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen());
        document.getElementById('studentSearchInput').addEventListener('input', renderFilteredStudentList);

        document.getElementById('floatingTableContent').addEventListener('scroll', window.hideNumPad, {passive: true});

        document.addEventListener('click', (e) => {
            const pad = document.getElementById('numPad');
            if (!pad || pad.classList.contains('hidden')) return;
            if (pad.contains(e.target)) return;
            if (e.target.tagName === 'INPUT') return; 
            window.hideNumPad();
        });
    }

    async function initCamera() { 
        try { 
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput'); 
            
            const select = document.getElementById('cameraSelect');
            if (select) {
                select.innerHTML = videoDevices.map((d, i) => `<option value="${d.deviceId}">${d.label || '鏡頭'+(i+1)}</option>`).join(''); 
                if (currentStream && currentStream.getVideoTracks().length > 0) {
                    const activeTrack = currentStream.getVideoTracks()[0];
                    const activeDev = videoDevices.find(d => d.label === activeTrack.label);
                    if (activeDev) select.value = activeDev.deviceId;
                }
            }
            
            if (videoDevices.length > 0) {
                if (document.getElementById('noCameraMsg')) document.getElementById('noCameraMsg').classList.add('hidden');
                await startStream(); 
            } else {
                throw new Error('未連接視訊硬體');
            }
        } catch (e) { 
            console.error('鏡頭初始化失敗:', e);
            if (document.getElementById('noCameraMsg')) document.getElementById('noCameraMsg').classList.remove('hidden'); 
        } 
    }
    
    async function startStream() { 
        const video = document.getElementById('video'), select = document.getElementById('cameraSelect'); 
        if (!video || !select || !select.value) return; 
        
        if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
        if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }

        try { 
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: select.value ? { exact: select.value } : undefined, width: { ideal: 3840 }, height: { ideal: 2160 }, frameRate: { ideal: 60 } } }); 
            video.srcObject = currentStream;
        } catch (e) { 
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true }); 
                video.srcObject = currentStream;
            } catch(err) {
                 if (document.getElementById('noCameraMsg')) document.getElementById('noCameraMsg').classList.remove('hidden'); 
            }
        } 
    }
    
    const camSelect = document.getElementById('cameraSelect'), refreshBtn = document.getElementById('refreshCamBtn');
    if (camSelect) camSelect.addEventListener('change', startStream);
    if (refreshBtn) refreshBtn.addEventListener('click', initCamera);
    
    window.showModal = (t, m, isHtml = false) => { 
        const title = document.getElementById('modalTitle'), msg = document.getElementById('modalMessage'), modal = document.getElementById('customModal'); 
        if (title) title.textContent = t; 
        if (msg) { if (isHtml) msg.innerHTML = m; else msg.textContent = m; }
        if (modal) modal.classList.remove('hidden'); 
    };

    window.showCameraTroubleshoot = function() {
        const title = "🎥 鏡頭連線疑難排解";
        const content = `
            <div class="text-left space-y-4 text-base mt-2 text-slate-600">
                <p class="font-bold text-rose-600 text-lg mb-4">無法開啟鏡頭 (例如 IPEVO) 時，請檢查以下三點：</p>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                    <h4 class="font-black text-slate-800 text-lg mb-1 flex items-center gap-2"><span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span>專屬軟體佔用 (最常見)</h4>
                    <p class="text-slate-500 mt-1 leading-relaxed">請確認已將 <b>IPEVO Visualizer</b> 等視訊軟體<span class="text-rose-600 font-bold">完全關閉</span>。</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                    <h4 class="font-black text-slate-800 text-lg mb-1 flex items-center gap-2"><span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span>瀏覽器權限封鎖</h4>
                    <p class="text-slate-500 mt-1 leading-relaxed">點擊網址列最左側的「🔒鎖頭」，確認「相機」已設定為<span class="text-blue-600 font-bold">允許</span>。</p>
                </div>
            </div>
        `;
        showModal(title, content, true);
    };

    /* --- 評分 Modal --- */
    window.openGradingModal = (idx, s) => { 
        currentSelectedStudentId = idx; 
        document.getElementById('gradingGradeClass').textContent = `${currentGrade}年${currentClass}班 - ${s.no}號`; 
        document.getElementById('gradingName').textContent = s.name; 
        document.getElementById('gradingCurrentScore').textContent = s.score; 
        document.getElementById('gradingTAToggle').checked = s.isTA; 
        document.getElementById('gradingModal').classList.remove('hidden'); 
    };
    window.closeGradingModal = () => document.getElementById('gradingModal').classList.add('hidden');
    window.updateScore = async (amt) => { if (currentSelectedStudentId === null) return; const list = window.classDataCache[currentGrade][currentClass]; list[currentSelectedStudentId].score += amt; document.getElementById('gradingCurrentScore').textContent = list[currentSelectedStudentId].score; await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: list }); };
    window.updateTAStatus = async (val) => { if (currentSelectedStudentId === null) return; const list = window.classDataCache[currentGrade][currentClass]; list[currentSelectedStudentId].isTA = val; await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: list }); };

    /* --- Firebase 啟மைப்பு --- */
    try {
        const hasEnv = typeof __firebase_config !== 'undefined' && __firebase_config, config = hasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        app = initializeApp(config); auth = getAuth(app); db = getFirestore(app);
        
        const authenticate = async () => { 
            try { 
                try {
                    const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    initialStream.getTracks().forEach(track => track.stop());
                } catch (permissionError) { }

                if (hasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); 
                else await signInAnonymously(auth); 
                isFirebaseReady = true; 
                
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('mode') === 'remote') {
                    document.getElementById('remoteMobileUI').classList.remove('hidden');
                } else {
                    window.startPcLockScreen();
                }
            } catch (err) { console.error(err); } 
        };
        authenticate();
    } catch (e) { console.error(e); }
</script>
