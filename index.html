<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗紀錄系統 v3.9 (連線燈號版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-layout { transition: all 0.3s ease-in-out; }
        
        :root {
            --table-width: 100%;
            --font-size: 14px;
            --col1-width: 140px; 
        }

        #table-container table { width: var(--table-width); font-size: var(--font-size); margin: 0 auto; table-layout: fixed; }
        #table-container th:first-child, #table-container td:first-child { width: var(--col1-width); word-break: break-all; }
        
        .student-item { transition: all 0.2s; border-radius: 8px; }
        .student-item:hover { background-color: #f3f4f6; cursor: pointer; transform: translateX(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; text-align: center; background: transparent; outline: none; border-bottom: 1px solid #e5e7eb; font-size: inherit; }
        .table-input:focus { border-bottom: 2px solid #3b82f6; }
        .fill-blank { border-bottom: 1px solid #4b5563; text-align: center; outline: none; background: transparent; font-size: inherit; }

        .resizer-line { width: 8px; background-color: #e5e7eb; cursor: col-resize; transition: background-color 0.2s; }
        .resizer-line:hover, .resizer-line:active { background-color: #60a5fa; }

        /* 燈號呼吸動畫 */
        .ping-green { animation: shadow-ping-green 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes shadow-ping-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden text-gray-800 text-xs md:text-sm">

<div id="mainContainer" class="flex h-full w-full flex-col md:flex-row transition-layout">
    
    <!-- 視訊顯示區 -->

            <button id="swapLayoutBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="左右互換"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button id="fullscreenBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="全螢幕模式"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
        </div>
        
        <button id="toggleSidebarBtn" class="absolute top-4 right-4 z-30 bg-blue-600 text-white p-2.5 rounded-full shadow-2xl hover:bg-blue-700 transform active:scale-95 transition-all">
            <svg id="sidebar-icon" class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
        </button>

        <video id="video" class="w-full h-full object-contain bg-gray-900 rounded-lg shadow-inner" autoplay playsinline></video>
        <div id="noCameraMsg" class="hidden absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-900/80 rounded-lg">偵測不到攝影機</div>
    </div>

    <div id="resizer" class="hidden md:flex resizer-line z-40 items-center justify-center shrink-0">
        <div class="w-1 h-12 bg-gray-400 rounded-full"></div>
    </div>

    <!-- 紀錄面板側邊欄 -->

        <div class="p-4 bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-blue-100 shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-extrabold text-blue-900 tracking-tight">實驗紀錄系統 <span class="text-xs font-normal text-white bg-blue-500 px-2 py-0.5 rounded-full ml-1 shadow-sm">v3.9 全校版</span></h1>
                <div class="flex items-center gap-2">
                    <button onclick="openSyncModal()" class="group relative text-sm bg-white border border-green-500 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-50 transition flex items-center gap-2 shadow-sm font-bold active:scale-95">
                        <span id="connStatusDot" class="w-2.5 h-2.5 rounded-full bg-gray-400" title="正在偵測 Sheets 連線..."></span>
                        Sheets 同步中心
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
                <select id="gradeSelect" class="border border-blue-200 rounded p-1.5 outline-none bg-white shadow-sm focus:ring-2 focus:ring-blue-400 transition"><option value="">讀取中...</option></select>
                <select id="classSelect" class="border border-blue-200 rounded p-1.5 outline-none bg-white shadow-sm focus:ring-2 focus:ring-blue-400 transition"><option value="">讀取中...</option></select>
            </div>

                <option value="exp2">2. 電阻串聯 (固定 3V)</option>

                        正在載入 Firebase 名單...

                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t shrink-0 flex flex-col gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button id="calcBtn" class="w-full bg-green-500 text-white font-black py-3 rounded-xl text-sm shadow hover:bg-green-600 active:scale-95 transition-all">自動計算 (V/I) × 1000</button>
            <div class="flex gap-2">
                <button id="clearExpBtn" class="flex-1 bg-red-50 text-red-600 border border-red-200 font-bold py-2.5 rounded-xl text-xs hover:bg-red-100 transition-colors">清除表格</button>
                <button id="saveExpBtn" class="flex-[2] bg-blue-600 text-white font-black py-2.5 rounded-xl text-xs shadow hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    儲存數據至 Firebase

            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /* 🔥 FIREBASE 設定 */
    const myFirebaseConfig = {
        apiKey: "AIzaSyACZgJU1uxCi1sHZe528cN7Aw7HQ0eMjtM",
        authDomain: "eletric-experiment.firebaseapp.com",
        projectId: "eletric-experiment",
        storageBucket: "eletric-experiment.firebasestorage.app",
        messagingSenderId: "21511409437",
        appId: "1:21511409437:web:4f27d726b5bfb9c4c6dbf4",
        measurementId: "G-S6BVBCQ6RS"
    };

    /* 🌐 GOOGLE SHEETS 預設連線 (您的新 ID) */
    const myDefaultGasUrl = "https://script.google.com/macros/s/AKfycbzGj5KcJxD9iXeR5jiQEe_g9FhK5eYF3UFpyqPaQzxm5Fcns5-KdcOCGUYbbZw6AQ0g/exec";

    let app, auth, db, user, isFirebaseReady = false;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    
    function getCollectionRef(colName) { return (typeof __app_id !== 'undefined') ? collection(db, 'artifacts', appId, 'public', 'data', colName) : collection(db, colName); }
    function getDocRef(colName, documentId) { return (typeof __app_id !== 'undefined') ? doc(db, 'artifacts', appId, 'public', 'data', colName, documentId) : doc(db, colName, documentId); }

    window.classDataCache = {};
    let unsubscribeStudents = null, currentGrade = '', currentClass = '', currentSelectedStudentId = null;
    let isSidebarOpen = true, currentSidebarWidth = 480;

    // --- 佈局控制 ---
    window.updateLayout = function() {
        const sidebar = document.getElementById('sidebar'), resizer = document.getElementById('resizer');
        const isMobile = window.innerWidth < 768;
        if (sidebar) sidebar.style.width = isSidebarOpen ? (isMobile ? '100%' : currentSidebarWidth + 'px') : '0px';
        if (resizer) resizer.style.display = isSidebarOpen && !isMobile ? 'flex' : 'none';
    };

    // --- 強化版連線工具 (支援 POST 重試) ---
    async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return await response.json();
            } catch (err) {
                if (i === retries - 1) throw err;
                await new Promise(res => setTimeout(res, delay));
                delay *= 2; 
            }
        }
    }

    // --- 連線燈號邏輯 (發送 action: check 給 doPost) ---
    async function checkSheetsConnection() {
        const dot = document.getElementById('connStatusDot');
        const badge = document.getElementById('syncStatusBadge');
        let url = localStorage.getItem('gasUrl') || myDefaultGasUrl;
        
        if (!dot) return;
        if (url && !url.endsWith('/exec')) {
            dot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
            if (badge) { badge.textContent = "網址錯誤"; badge.className = "px-2 py-1 rounded text-[10px] font-bold bg-red-100 text-red-600"; }
            return;
        }

        dot.className = "w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse";
        try {
            const res = await fetchWithRetry(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: 'check' }) 
            });
            if (res && res.status === 'success') {
                dot.className = "w-2.5 h-2.5 rounded-full bg-green-500 ping-green";
                if (badge) { badge.textContent = "已連線"; badge.className = "px-2 py-1 rounded text-[10px] font-bold bg-green-100 text-green-600"; }
            } else throw new Error();
        } catch (e) {
            dot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
            if (badge) { badge.textContent = "連線失敗"; badge.className = "px-2 py-1 rounded text-[10px] font-bold bg-red-100 text-red-600"; }
        }
    }

    window.initApp = async function() {
        await fetchClassList();
        renderTableTemplate();
        setupEventListeners();
        initCamera();
        window.updateLayout();
        setTimeout(checkSheetsConnection, 1500); 
    };

    async function fetchClassList() {
        if (!isFirebaseReady) return;
        try {
            const snapshot = await getDocs(getCollectionRef('classes'));
            window.classDataCache = {};
            const gradesSet = new Set();
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if(!window.classDataCache[data.grade]) window.classDataCache[data.grade] = {};
                window.classDataCache[data.grade][data.className] = data.students || [];
                gradesSet.add(data.grade);
            });
            const grades = Array.from(gradesSet).sort();
            if (grades.length > 0) updateDropdowns(grades);
            else document.getElementById('gradeSelect').innerHTML = '<option value="">請同步名單</option>';
        } catch (e) { console.error(e); }
    }

    function updateDropdowns(grades) {
        const gradeSelect = document.getElementById('gradeSelect');
        if (!gradeSelect) return;
        gradeSelect.innerHTML = '';
        grades.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g; opt.textContent = `${g} 年級`;
            gradeSelect.appendChild(opt);
        });
        if(grades.length > 0) { gradeSelect.value = grades[0]; updateClassDropdown(); }
    }

    window.updateClassDropdown = function() {
        const g = document.getElementById('gradeSelect').value;
        currentGrade = g;
        const classSelect = document.getElementById('classSelect');
        if (!classSelect) return;
        classSelect.innerHTML = '';
        if (window.classDataCache[g]) {
            const classes = Object.keys(window.classDataCache[g]).sort();
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = `${c} 班`;
                classSelect.appendChild(opt);
            });
            if(classes.length > 0) { classSelect.value = classes[0]; currentClass = classes[0]; loadClassStudents(); loadExpData(); }
        }
    }

    window.loadClassStudents = function() {
        currentGrade = document.getElementById('gradeSelect').value;
        currentClass = document.getElementById('classSelect').value;
        if (!currentGrade || !currentClass || !isFirebaseReady) return;
        if (unsubscribeStudents) unsubscribeStudents();
        unsubscribeStudents = onSnapshot(getDocRef('classes', `${currentGrade}_${currentClass}`), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (!window.classDataCache[currentGrade]) window.classDataCache[currentGrade] = {};
                window.classDataCache[currentGrade][currentClass] = data.students || [];
                renderFilteredStudentList();
                showSaveSuccess();
            }
        });
    }

    function renderFilteredStudentList() {
        const students = window.classDataCache[currentGrade][currentClass] || [];
        const keyword = document.getElementById('studentSearchInput').value.trim().toLowerCase();
        const filtered = students.filter(s => s.name.toLowerCase().includes(keyword) || s.no.toString().includes(keyword));
        const listContainer = document.getElementById('student-list');
        if (!listContainer) return;
        document.getElementById('studentCount').textContent = students.length + '人';
        listContainer.innerHTML = '';
        if (filtered.length === 0) { listContainer.innerHTML = '<div class="p-8 text-center text-gray-400 text-xs">查無學生</div>'; return; }
        filtered.forEach((s) => {
            const originalIndex = students.findIndex(orig => orig.no === s.no);
            const item = document.createElement('div');
            item.className = `student-item ${s.isTA ? 'bg-indigo-50' : 'bg-white'} flex items-center justify-between px-4 py-3 border-b`;
            item.onclick = () => openGradingModal(originalIndex, s);
            item.innerHTML = `<div class="flex items-center gap-3 text-xs"><span class="w-8 h-8 rounded-full ${s.isTA ? 'bg-indigo-200 text-indigo-800' : 'bg-blue-100 text-blue-700'} flex items-center justify-center font-bold shrink-0">${s.no}</span><span class="font-bold ${s.isTA ? 'text-indigo-700' : 'text-gray-800'} text-base">${s.name}</span>${s.isTA ? '<span class="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-black border border-indigo-200">小老師</span>' : ''}</div><span class="text-lg font-black ${s.score > 0 ? 'text-green-600' : (s.score < 0 ? 'text-red-500' : 'text-gray-400')} w-8 text-right">${s.score}</span>`;
            listContainer.appendChild(item);
        });
    }

    /* --- 同步功能 --- */
    window.openSyncModal = () => {
        document.getElementById('gasUrlInput').value = localStorage.getItem('gasUrl') || myDefaultGasUrl;
        document.getElementById('syncModal').classList.remove('hidden');
        checkSheetsConnection();
    };
    window.closeSyncModal = () => {
        localStorage.setItem('gasUrl', document.getElementById('gasUrlInput').value.trim());
        document.getElementById('syncModal').classList.add('hidden');
        checkSheetsConnection();
    };

    window.pullFromSheets = async function() {
        let url = document.getElementById('gasUrlInput').value.trim();
        if (!url || !isFirebaseReady) return showModal('錯誤', 'Firebase 連線中...');
        showLoading('正在同步最新名單與數據...');
        try {
            const res = await fetchWithRetry(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: 'pull' }) 
            });
            if (res && res.status === 'success') {
                for (let k in res.classes) await setDoc(getDocRef('classes', k), res.classes[k]);
                if (document.getElementById('syncExpsToggle').checked && res.experiments) {
                    for (let id in res.experiments) await setDoc(getDocRef('experiments', id), res.experiments[id]);
                }
                hideLoading(); showModal('同步完成', '數據已更新！');
                await fetchClassList();
                document.getElementById('syncModal').classList.add('hidden');
            } else throw new Error(res.message);
        } catch (e) { hideLoading(); showModal('同步失敗', e.message); }
    };

    window.pushToSheets = async function() {
        let url = document.getElementById('gasUrlInput').value.trim();
        if (!url || !isFirebaseReady) return showModal('錯誤', 'Firebase 連線中...');
        showLoading('正在將數據上傳備份...');
        try {
            let exps = {};
            if (document.getElementById('syncExpsToggle').checked) {
                const qSnap = await getDocs(getCollectionRef('experiments'));
                qSnap.forEach(d => { exps[d.id] = d.data(); });
            }
            const res = await fetchWithRetry(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: 'push', classes: window.classDataCache, experiments: exps }) 
            });
            if (res && res.status === 'success') {
                hideLoading(); showModal('備份成功', `成績與實驗紀錄已更新回試算表。`);
                document.getElementById('syncModal').classList.add('hidden');
            } else throw new Error(res.message);
        } catch (e) { hideLoading(); showModal('上傳失敗', e.message); }
    };

    function showLoading(m) { document.getElementById('loadingMsg').textContent = m; document.getElementById('loadingModal').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingModal').classList.add('hidden'); }

    /* --- 評分 --- */
    window.openGradingModal = (idx, s) => { currentSelectedStudentId = idx; document.getElementById('gradingGradeClass').textContent = `${currentGrade}年${currentClass}班 - ${s.no}號`; document.getElementById('gradingName').textContent = s.name; document.getElementById('gradingCurrentScore').textContent = s.score; document.getElementById('gradingTAToggle').checked = s.isTA; document.getElementById('gradingModal').classList.remove('hidden'); };
    window.closeGradingModal = () => document.getElementById('gradingModal').classList.add('hidden');
    window.updateScore = async (amt) => { if (currentSelectedStudentId === null) return; const list = window.classDataCache[currentGrade][currentClass]; list[currentSelectedStudentId].score += amt; document.getElementById('gradingCurrentScore').textContent = list[currentSelectedStudentId].score; await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: list }); };
    window.updateTAStatus = async (val) => { if (currentSelectedStudentId === null) return; const list = window.classDataCache[currentGrade][currentClass]; list[currentSelectedStudentId].isTA = val; await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: list }); };

    /* --- 實驗表格 --- */
    window.renderTableTemplate = () => {
        const val = document.getElementById('expSelect').value, container = document.getElementById('table-container');
        if (!container) return;
        if (val === 'exp1') container.innerHTML = `<h3 class="font-black text-center text-blue-900 mb-3 text-lg underline decoration-blue-200">1. 固定電阻 (1000Ω)</h3><table class="border-collapse text-center w-full shadow-sm rounded-lg overflow-hidden border border-blue-100"><thead><tr class="bg-blue-600 text-white text-[10px]"><th>輸入電壓</th><th>實際電壓(V)</th><th>電流(mA)</th><th>比值(Ω)</th></tr></thead><tbody><tr class="border-b border-blue-50"><td>1.5V</td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r font-black text-blue-600">-</td></tr><tr class="border-b border-blue-50"><td>3V</td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r font-black text-blue-600">-</td></tr><tr><td>4.5V</td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r font-black text-blue-600">-</td></tr></tbody></table>`;
        else if (val === 'exp2' || val === 'exp3') { const sym = val === 'exp2' ? '+' : '//'; container.innerHTML = `<h3 class="font-black text-center text-blue-900 mb-3 text-lg underline decoration-blue-200">${val==='exp2'?'串聯':'並聯'}實驗</h3><table class="border-collapse text-center w-full shadow-sm rounded-lg overflow-hidden border border-blue-100"><thead><tr class="bg-blue-600 text-white text-[10px]"><th>組合</th><th>三用電表(Ω)</th><th>電壓(V)</th><th>電流(mA)</th><th>比值(Ω)</th></tr></thead><tbody><tr class="border-b border-blue-50"><td>1個：1K</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r font-black text-blue-600">-</td></tr><tr class="border-b border-blue-50"><td>2個：1K${sym}1K</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r font-black text-blue-600">-</td></tr><tr><td>3個：1K${sym}1K${sym}1K</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r font-black text-blue-600">-</td></tr></tbody></table>`; }
        else container.innerHTML = `<h3 class="font-black text-center text-green-700 mb-3 text-lg underline decoration-green-200">4. 並聯迴路觀察</h3><table class="border-collapse text-center w-full shadow-sm rounded-lg overflow-hidden border border-green-100"><thead><tr class="bg-green-600 text-white text-[10px]"><th>位置</th><th>電阻(Ω)</th><th>電壓(V)</th><th>電流(mA)</th></tr></thead><tbody><tr class="border-b border-green-50"><td>迴路 1</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr><tr class="border-b border-green-50"><td>迴路 2</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr><tr class="bg-green-50 text-xs"><td>總和</td><td><input type="number" class="table-input font-bold"></td><td><input type="number" class="table-input font-bold"></td><td><input type="number" class="table-input font-bold"></td></tr></tbody></table>`;
        loadExpData();
    };

    window.calculateRatio = () => { document.querySelectorAll('#table-container tr').forEach(row => { const vIn = row.querySelector('.input-v'), iIn = row.querySelector('.input-i'), res = row.querySelector('.result-r'); if (res) { let v = vIn ? parseFloat(vIn.value) : (row.cells[0]?.innerText.includes('V') ? parseFloat(row.cells[0].innerText) : NaN); const i = iIn ? parseFloat(iIn.value) : NaN; res.textContent = (!isNaN(v) && !isNaN(i) && i !== 0) ? ((v / i) * 1000).toFixed(2) : '-'; } }); };
    window.saveExpData = async function() { 
        if (!currentGrade || !currentClass || !isFirebaseReady) return showModal('錯誤', '未選班級'); 
        const btn = document.getElementById('saveExpBtn'), expType = document.getElementById('expSelect').value, data = Array.from(document.querySelectorAll('#table-container input')).map(i => i.value); 
        btn.disabled = true;
        try {
            await setDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${expType}`), { grade: currentGrade, className: currentClass, expType, data, updatedAt: new Date().toLocaleString() }); 
            showSaveSuccess(); 
        } catch (e) { showModal('儲存失敗', e.message); }
        btn.disabled = false;
    };
    window.loadExpData = async () => { if (!currentGrade || !currentClass || !isFirebaseReady) return; try { const snap = await getDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${document.getElementById('expSelect').value}`)); if (snap.exists()) { const ins = document.querySelectorAll('#table-container input'); snap.data().data.forEach((v, i) => { if (ins[i]) ins[i].value = v; }); calculateRatio(); } } catch (e) {} };

    /* --- 基本設定 --- */
    function setupEventListeners() {
        document.getElementById('gradeSelect').addEventListener('change', updateClassDropdown);
        document.getElementById('classSelect').addEventListener('change', () => { loadClassStudents(); loadExpData(); });
        document.getElementById('expSelect').addEventListener('change', renderTableTemplate);
        document.getElementById('calcBtn').addEventListener('click', calculateRatio);
        document.getElementById('saveExpBtn').addEventListener('click', saveExpData);
        document.getElementById('fontSlider').addEventListener('input', (e) => document.documentElement.style.setProperty('--font-size', e.target.value + 'px'));
        document.getElementById('colWidthSlider').addEventListener('input', (e) => document.documentElement.style.setProperty('--col1-width', e.target.value + 'px'));
        document.getElementById('swapLayoutBtn').addEventListener('click', () => document.getElementById('mainContainer').classList.toggle('md:flex-row-reverse'));
        document.getElementById('fullscreenBtn').addEventListener('click', () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen());
        document.getElementById('studentSearchInput').addEventListener('input', renderFilteredStudentList);

        const resizer = document.getElementById('resizer'), toggleBtn = document.getElementById('toggleSidebarBtn');
        if (resizer) {
            resizer.addEventListener('mousedown', () => { window.isResizing = true; document.body.style.cursor = 'col-resize'; });
            document.addEventListener('mousemove', (e) => { if (!window.isResizing) return; currentSidebarWidth += document.getElementById('mainContainer').classList.contains('md:flex-row-reverse') ? e.movementX : -e.movementX; currentSidebarWidth = Math.max(320, Math.min(currentSidebarWidth, window.innerWidth * 0.8)); window.updateLayout(); });
            document.addEventListener('mouseup', () => { window.isResizing = false; document.body.style.cursor = ''; });
        }
        if (toggleBtn) toggleBtn.addEventListener('click', () => { isSidebarOpen = !isSidebarOpen; window.updateLayout(); });
        window.addEventListener('resize', window.updateLayout);
    }

    async function initCamera() { try { await navigator.mediaDevices.getUserMedia({ video: true }); const devices = await navigator.mediaDevices.enumerateDevices(), videoDevices = devices.filter(d => d.kind === 'videoinput'); if (document.getElementById('cameraSelect')) document.getElementById('cameraSelect').innerHTML = videoDevices.map((d, i) => `<option value="${d.deviceId}">${d.label || '鏡頭'+(i+1)}</option>`).join(''); startStream(); } catch (e) { if (document.getElementById('noCameraMsg')) document.getElementById('noCameraMsg').classList.remove('hidden'); } }
    async function startStream() { const video = document.getElementById('video'), select = document.getElementById('cameraSelect'); if (!video || !select || !select.value) return; try { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: select.value }, width: { ideal: 3840 }, height: { ideal: 2160 } } }); } catch (e) { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: select.value } } }); } }
    
    const camSelect = document.getElementById('cameraSelect'), refreshBtn = document.getElementById('refreshCamBtn');
    if (camSelect) camSelect.addEventListener('change', startStream);
    if (refreshBtn) refreshBtn.addEventListener('click', initCamera);

    function showSaveSuccess() { const ind = document.getElementById('saveStatusIndicator'); if (ind) { ind.classList.remove('hidden'); setTimeout(() => ind.classList.add('hidden'), 2000); } }
    window.showModal = (t, m) => { const title = document.getElementById('modalTitle'), msg = document.getElementById('modalMessage'), modal = document.getElementById('customModal'); if (title) title.textContent = t; if (msg) msg.textContent = m; if (modal) modal.classList.remove('hidden'); };

    /* --- 初始化 --- */
    try {
        const hasEnv = typeof __firebase_config !== 'undefined' && __firebase_config, config = hasEnv ? JSON.parse(__firebase_config) : myFirebaseConfig;
        app = initializeApp(config); auth = getAuth(app); db = getFirestore(app);
        const authenticate = async () => { try { if (hasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); isFirebaseReady = true; window.initApp(); } catch (err) { await signInAnonymously(auth); isFirebaseReady = true; window.initApp(); } };
        authenticate();
    } catch (e) { console.error(e); }
</script>
</body>
</html>
