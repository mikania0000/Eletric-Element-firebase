<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗紀錄系統 v3.4 (Firebase+Sheets雙功能版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .transition-layout { transition: all 0.3s ease-in-out; }
        
        :root {
            --table-width: 100%;
            --font-size: 14px;
            --col1-width: 140px; 
        }

        #table-container table { width: var(--table-width); font-size: var(--font-size); margin: 0 auto; table-layout: fixed; }
        #table-container th:first-child, #table-container td:first-child { width: var(--col1-width); word-break: break-all; }
        
        .student-item { transition: all 0.2s; border-radius: 8px; }
        .student-item:hover { background-color: #f3f4f6; cursor: pointer; transform: translateX(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; text-align: center; background: transparent; outline: none; border-bottom: 1px solid #e5e7eb; font-size: inherit; }
        .table-input:focus { border-bottom: 2px solid #3b82f6; }
        .fill-blank { border-bottom: 1px solid #4b5563; text-align: center; outline: none; background: transparent; font-size: inherit; }

        .resizer-line { width: 8px; background-color: #e5e7eb; cursor: col-resize; transition: background-color 0.2s; }
        .resizer-line:hover, .resizer-line:active { background-color: #60a5fa; }

        .modal-enter { animation: modalFadeIn 0.2s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden text-gray-800">

<div id="mainContainer" class="flex h-full w-full flex-col md:flex-row transition-layout">
    
    <!-- 視訊顯示區 -->
    <div id="videoContainer" class="relative bg-black flex flex-col items-center justify-center p-2 flex-1 h-full min-w-0 transition-layout">

            <button id="swapLayoutBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="左右互換"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button id="fullscreenBtn" class="bg-gray-200 hover:bg-gray-300 p-1.5 rounded transition-colors" title="全螢幕模式"><svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
        </div>
        
        <button id="toggleSidebarBtn" class="absolute top-4 right-4 z-30 bg-blue-600 text-white p-2.5 rounded-full shadow-2xl hover:bg-blue-700 transform active:scale-95 transition-all">

        </button>

        <div id="noCameraMsg" class="hidden absolute inset-0 flex flex-col items-center justify-center text-gray-400 bg-gray-900/80 rounded-lg">偵測不到攝影機</div>

    <div id="resizer" class="hidden md:flex resizer-line z-40 items-center justify-center shrink-0">

    </div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    /* * ==========================================
     * 🔥 FIREBASE 設定區 (如果要自行託管在 GitHub，請修改這裡)
     * ==========================================
     */
    const myFirebaseConfig = {
        apiKey: "AIzaSyACZgJU1uxCi1sHZe528cN7Aw7HQ0eMjtM",
        authDomain: "eletric-experiment.firebaseapp.com",
        projectId: "eletric-experiment",
        storageBucket: "eletric-experiment.firebasestorage.app",
        messagingSenderId: "21511409437",
        appId: "1:21511409437:web:4f27d726b5bfb9c4c6dbf4",
        measurementId: "G-S6BVBCQ6RS"
    };

    let app, auth, db, user, isFirebaseReady = false;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    
    function getCollectionRef(colName) { 
        if (typeof __app_id !== 'undefined') {
            return collection(db, 'artifacts', appId, 'public', 'data', colName);
        }
        return collection(db, colName);
    }
    
    function getDocRef(colName, documentId) { 
        if (typeof __app_id !== 'undefined') {
            return doc(db, 'artifacts', appId, 'public', 'data', colName, documentId);
        }
        return doc(db, colName, documentId);
    }

    // 全域緩存
    window.classDataCache = {};
    let unsubscribeStudents = null;
    let currentGrade = '', currentClass = '', currentSelectedStudentId = null;

    window.initApp = async function() {
        await fetchClassList();
        renderTableTemplate();
        setupEventListeners();
        initCamera();
        updateLayout();
    };

    async function fetchClassList() {
        if (!isFirebaseReady) return;
        try {
            const classesRef = getCollectionRef('classes');
            const snapshot = await getDocs(classesRef);
            window.classDataCache = {};
            const gradesSet = new Set();
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if(!window.classDataCache[data.grade]) window.classDataCache[data.grade] = {};
                window.classDataCache[data.grade][data.className] = data.students || [];
                gradesSet.add(data.grade);
            });
            const grades = Array.from(gradesSet).sort();
            if (grades.length > 0) updateDropdowns(grades);
            else {
                document.getElementById('gradeSelect').innerHTML = '<option value="">請匯入名單</option>';
                document.getElementById('student-list').innerHTML = '<div class="p-8 text-center text-gray-400">目前沒有資料</div>';
            }
        } catch (e) { console.error(e); }
    }

    function updateDropdowns(grades) {
        const gradeSelect = document.getElementById('gradeSelect');
        gradeSelect.innerHTML = '';
        grades.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g; opt.textContent = `${g} 年級`;
            gradeSelect.appendChild(opt);
        });
        if(grades.length > 0) { gradeSelect.value = grades[0]; updateClassDropdown(); }
    }

    window.updateClassDropdown = function() {
        const gradeSelect = document.getElementById('gradeSelect');
        const classSelect = document.getElementById('classSelect');
        const g = gradeSelect.value;
        currentGrade = g;
        classSelect.innerHTML = '';
        if (window.classDataCache[g]) {
            const classes = Object.keys(window.classDataCache[g]).sort();
            classes.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = `${c} 班`;
                classSelect.appendChild(opt);
            });
            if(classes.length > 0) { classSelect.value = classes[0]; currentClass = classes[0]; loadClassStudents(); loadExpData(); }
        }
    }

    window.loadClassStudents = function() {
        currentGrade = document.getElementById('gradeSelect').value;
        currentClass = document.getElementById('classSelect').value;
        if (!currentGrade || !currentClass || !isFirebaseReady) return;
        if (unsubscribeStudents) unsubscribeStudents();
        const docRef = getDocRef('classes', `${currentGrade}_${currentClass}`);
        unsubscribeStudents = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (!window.classDataCache[currentGrade]) window.classDataCache[currentGrade] = {};
                window.classDataCache[currentGrade][currentClass] = data.students || [];
                renderStudentList(data.students || []);
                showSaveSuccess();
            }
        }, (err) => console.error("Snapshot error:", err));
    }

    function renderStudentList(students) {
        const listContainer = document.getElementById('student-list');
        document.getElementById('studentCount').textContent = students.length + '人';
        listContainer.innerHTML = '';
        students.forEach((s, idx) => {
            const item = document.createElement('div');
            item.className = `student-item ${s.isTA ? 'bg-indigo-50' : 'bg-white'} flex items-center justify-between px-4 py-3 border-b`;
            item.onclick = () => openGradingModal(idx, s);
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-full ${s.isTA ? 'bg-indigo-200 text-indigo-800' : 'bg-blue-100 text-blue-700'} flex items-center justify-center font-bold text-xs">${s.no}</span>
                    <span class="font-bold ${s.isTA ? 'text-indigo-700' : 'text-gray-800'} text-base">${s.name}</span>
                    ${s.isTA ? '<span class="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-bold border">小老師</span>' : ''}
                </div>
                <span class="text-lg font-black ${s.score > 0 ? 'text-green-600' : (s.score < 0 ? 'text-red-500' : 'text-gray-400')} w-8 text-right">${s.score}</span>`;
            listContainer.appendChild(item);
        });
    }

    // --- 同步邏輯 ---
    window.openSyncModal = () => {
        const savedUrl = localStorage.getItem('gasUrl');
        if (savedUrl) document.getElementById('gasUrlInput').value = savedUrl;
        document.getElementById('syncModal').classList.remove('hidden');
    };
    window.closeSyncModal = () => {
        localStorage.setItem('gasUrl', document.getElementById('gasUrlInput').value.trim());
        document.getElementById('syncModal').classList.add('hidden');
    };

    window.pullFromSheets = async function() {
        const url = document.getElementById('gasUrlInput').value.trim();
        if (!url || !isFirebaseReady) return showModal('錯誤', '請確認網址與資料庫連線');
        localStorage.setItem('gasUrl', url);
        
        showLoading('正在從試算表抓取名單與實驗紀錄...');
        try {
            const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'pull' }) });
            const res = await resp.json();
            if (res.status === 'success') {
                for (let k in res.classes) await setDoc(getDocRef('classes', k), res.classes[k]);
                if (document.getElementById('syncExpsToggle').checked && res.experiments) {
                    for (let id in res.experiments) await setDoc(getDocRef('experiments', id), { ...res.experiments[id], id: id });
                }
                hideLoading(); showModal('同步完成', '名單與紀錄已從試算表更新至 Firebase。');
                await fetchClassList();
                document.getElementById('syncModal').classList.add('hidden');
            } else { throw new Error(res.message); }
        } catch (e) { hideLoading(); showModal('失敗', e.message); }
    };

    window.pushToSheets = async function() {
        const url = document.getElementById('gasUrlInput').value.trim();
        if (!url || !isFirebaseReady) return showModal('錯誤', '請確認網址與資料庫連線');
        
        showLoading('正在備份成績與實驗紀錄至試算表...');
        try {
            let exps = {};
            if (document.getElementById('syncExpsToggle').checked) {
                const qSnap = await getDocs(getCollectionRef('experiments'));
                qSnap.forEach(d => exps[d.id] = d.data());
            }

            const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'push', classes: window.classDataCache, experiments: exps }) });
            const res = await resp.json();
            if (res.status === 'success') {
                hideLoading(); showModal('備份成功', `已將成績與 ${res.updatedExps || 0} 筆實驗紀錄更新至 Google 試算表。`);
                document.getElementById('syncModal').classList.add('hidden');
            } else { throw new Error(res.message); }
        } catch (e) { hideLoading(); showModal('失敗', e.message); }
    };

    function showLoading(m) { document.getElementById('loadingMsg').textContent = m; document.getElementById('loadingModal').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingModal').classList.add('hidden'); }

    // ================= 加扣分邏輯 =================
    window.openGradingModal = function(index, student) {
        currentSelectedStudentId = index;
        document.getElementById('gradingGradeClass').textContent = `${currentGrade}年${currentClass}班 - ${student.no}號`;
        document.getElementById('gradingName').textContent = student.name;
        document.getElementById('gradingCurrentScore').textContent = student.score;
        document.getElementById('gradingTAToggle').checked = student.isTA;
        document.getElementById('gradingModal').classList.remove('hidden');
    }
    window.closeGradingModal = () => document.getElementById('gradingModal').classList.add('hidden');

    window.updateScore = async function(amount) {
        if (currentSelectedStudentId === null) return;
        const students = window.classDataCache[currentGrade][currentClass];
        const newScore = students[currentSelectedStudentId].score + amount;
        document.getElementById('gradingCurrentScore').textContent = newScore;
        
        try {
            const docRef = getDocRef('classes', `${currentGrade}_${currentClass}`);
            students[currentSelectedStudentId].score = newScore;
            await updateDoc(docRef, { students: students });
        } catch (e) { console.error(e); }
    }

    window.updateTAStatus = async function(val) {
        if (currentSelectedStudentId === null) return;
        const students = window.classDataCache[currentGrade][currentClass];
        students[currentSelectedStudentId].isTA = val;
        try {
            await updateDoc(getDocRef('classes', `${currentGrade}_${currentClass}`), { students: students });
        } catch (e) { console.error(e); }
    }

    // ================= 實驗表格邏輯 =================
    window.renderTableTemplate = function() {
        const val = document.getElementById('expSelect').value;
        const container = document.getElementById('table-container');
        let html = '';
        if (val === 'exp1') {
            html = `<h3 class="font-bold text-center text-blue-900 mb-3 text-lg">1. 固定電阻 (1000Ω)</h3><table class="border-collapse text-center w-full"><thead><tr class="bg-blue-100"><th>輸入電壓</th><th>實際電壓(V)</th><th>電流(mA)</th><th>比值(Ω)</th></tr></thead><tbody><tr><td>1.5V</td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r">-</td></tr><tr><td>3V</td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r">-</td></tr><tr><td>4.5V</td><td><input type="number" class="table-input input-v" step="any"></td><td><input type="number" class="table-input input-i" step="any"></td><td class="result-r">-</td></tr></tbody></table>`;
        } else if (val === 'exp2' || val === 'exp3') {
            const sym = val === 'exp2' ? '+' : '//';
            html = `<h3 class="font-bold text-center text-blue-900 mb-3 text-lg">${val==='exp2'?'串聯':'並聯'}實驗</h3><table class="border-collapse text-center w-full"><thead><tr class="bg-blue-100"><th>組合</th><th>三用電表(Ω)</th><th>電壓(V)</th><th>電流(mA)</th><th>比值(Ω)</th></tr></thead><tbody><tr><td>1個：<input type="text" class="fill-blank w-8" value="1K"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr><tr><td>2個：<input type="text" class="fill-blank w-6" value="1K">${sym}<input type="text" class="fill-blank w-6" value="1K"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr><tr><td>3個：<input type="text" class="fill-blank w-4" value="1K">${sym}<input type="text" class="fill-blank w-4" value="1K">${sym}<input type="text" class="fill-blank w-4" value="1K"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input input-v"></td><td><input type="number" class="table-input input-i"></td><td class="result-r">-</td></tr></tbody></table>`;
        } else if (val === 'exp4') {
            html = `<h3 class="font-bold text-center text-green-700 mb-3 text-lg">4. 並聯迴路觀察</h3><table class="border-collapse text-center w-full"><thead><tr class="bg-green-100"><th>位置</th><th>電阻(Ω)</th><th>電壓(V)</th><th>電流(mA)</th></tr></thead><tbody><tr><td>迴路 1</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr><tr><td>迴路 2</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr><tr><td>總和</td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td><td><input type="number" class="table-input"></td></tr></tbody></table>`;
        }
        container.innerHTML = html;
        loadExpData();
    }

    window.calculateRatio = function() {
        document.querySelectorAll('#table-container tr').forEach(row => {
            const vIn = row.querySelector('.input-v'), iIn = row.querySelector('.input-i');
            let v = vIn ? parseFloat(vIn.value) : (row.cells[0]?.innerText.includes('V') ? parseFloat(row.cells[0].innerText) : NaN);
            const i = iIn ? parseFloat(iIn.value) : NaN, res = row.querySelector('.result-r');
            if (res) res.textContent = (!isNaN(v) && !isNaN(i) && i !== 0) ? ((v / i) * 1000).toFixed(2) : '-';
        });
    }

    window.saveExpData = async function() {
        if (!currentGrade || !currentClass || !isFirebaseReady) return showModal('錯誤', '請選擇班級');
        const expType = document.getElementById('expSelect').value;
        const data = Array.from(document.querySelectorAll('#table-container input')).map(i => i.value);
        const docId = `${currentGrade}_${currentClass}_${expType}`;
        const btn = document.getElementById('saveExpBtn');
        btn.disabled = true;
        try {
            await setDoc(getDocRef('experiments', docId), { grade: currentGrade, className: currentClass, expType, data, updatedAt: new Date().toISOString() });
            showSaveSuccess();
        } catch (e) { showModal('錯誤', e.message); }
        btn.disabled = false;
    }

    window.loadExpData = async function() {
        if (!currentGrade || !currentClass || !isFirebaseReady) return;
        const expType = document.getElementById('expSelect').value;
        try {
            const docSnap = await getDoc(getDocRef('experiments', `${currentGrade}_${currentClass}_${expType}`));
            if (docSnap.exists()) {
                const data = docSnap.data().data;
                const ins = document.querySelectorAll('#table-container input');
                ins.forEach((input, idx) => { if (data[idx] !== undefined) input.value = data[idx]; });
                calculateRatio();
            }
        } catch (e) {}
    }

    // ================= 初始化與基本控制 =================
    function setupEventListeners() {
        document.getElementById('gradeSelect').addEventListener('change', updateClassDropdown);
        document.getElementById('classSelect').addEventListener('change', () => { loadClassStudents(); loadExpData(); });
        document.getElementById('expSelect').addEventListener('change', renderTableTemplate);
        document.getElementById('calcBtn').addEventListener('click', calculateRatio);
        document.getElementById('saveExpBtn').addEventListener('click', saveExpData);
        document.getElementById('fontSlider').addEventListener('input', (e) => document.documentElement.style.setProperty('--font-size', e.target.value + 'px'));
        document.getElementById('colWidthSlider').addEventListener('input', (e) => document.documentElement.style.setProperty('--col1-width', e.target.value + 'px'));
        document.getElementById('swapLayoutBtn').addEventListener('click', () => document.getElementById('mainContainer').classList.toggle('md:flex-row-reverse'));
        document.getElementById('fullscreenBtn').addEventListener('click', () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen());
        setupResizer();
    }

    async function initCamera() {
        const cameraSelect = document.getElementById('cameraSelect');
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.innerHTML = videoDevices.map((d, i) => `<option value="${d.deviceId}">${d.label || '鏡頭'+(i+1)}</option>`).join('');
            startStream();
        } catch (e) { document.getElementById('noCameraMsg').classList.remove('hidden'); }
    }
    
    async function startStream() {
        const video = document.getElementById('video'), devId = document.getElementById('cameraSelect').value;
        if (!devId) return;
        try {
            video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: devId }, width: { ideal: 3840 }, height: { ideal: 2160 } } });
        } catch (e) { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: devId } } }); }
    }
    document.getElementById('cameraSelect').addEventListener('change', startStream);
    document.getElementById('refreshCamBtn').addEventListener('click', initCamera);

    let isSidebarOpen = true, currentSidebarWidth = 480;
    function setupResizer() {
        const resizer = document.getElementById('resizer'), sidebar = document.getElementById('sidebar'), toggleBtn = document.getElementById('toggleSidebarBtn');
        let isResizing = false, lastX = 0;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; lastX = e.clientX; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const dx = e.clientX - lastX; lastX = e.clientX;
            currentSidebarWidth += document.getElementById('mainContainer').classList.contains('md:flex-row-reverse') ? dx : -dx;
            currentSidebarWidth = Math.max(320, Math.min(currentSidebarWidth, window.innerWidth * 0.8));
            sidebar.style.width = currentSidebarWidth + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = ''; });
        window.updateLayout = () => {
            const isMobile = window.innerWidth < 768;
            sidebar.style.width = isSidebarOpen ? (isMobile ? '100%' : currentSidebarWidth + 'px') : '0px';
            resizer.style.display = isSidebarOpen && !isMobile ? 'flex' : 'none';
        };
        toggleBtn.addEventListener('click', () => { isSidebarOpen = !isSidebarOpen; updateLayout(); });
        window.addEventListener('resize', updateLayout);
    }

    function showSaveSuccess() {
        const ind = document.getElementById('saveStatusIndicator');
        ind.classList.remove('hidden'); setTimeout(() => ind.classList.add('hidden'), 2000);
    }
    window.showModal = (t, m) => { document.getElementById('modalTitle').textContent = t; document.getElementById('modalMessage').textContent = m; document.getElementById('customModal').classList.remove('hidden'); };

    // --- 修正報錯的核心初始化區塊 ---
    try {
        const hasEnvConfig = typeof __firebase_config !== 'undefined' && __firebase_config;
        const configToUse = hasEnvConfig ? JSON.parse(__firebase_config) : myFirebaseConfig;

        app = initializeApp(configToUse); 
        auth = getAuth(app); 
        db = getFirestore(app);

        const authenticate = async () => {
            try {
                // 如果環境變數與 Config 匹配（預覽模式），使用系統 Token
                if (hasEnvConfig && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // 自行託管或 Token 不匹配時，強制使用匿名登入
                    await signInAnonymously(auth);
                }
                isFirebaseReady = true; 
                window.initApp();
            } catch (err) {
                console.error("Auth mismatch or error, falling back to anonymous:", err);
                await signInAnonymously(auth);
                isFirebaseReady = true; 
                window.initApp();
            }
        };
        authenticate();
    } catch (e) { 
        console.error("Firebase Init Error:", e); 
    }

</script>
</body>
</html>
